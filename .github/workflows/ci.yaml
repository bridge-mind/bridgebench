name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contamination-guard:
    name: No hidden references in the public repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if private task halves are tracked
        run: |
          if git ls-files | grep -E '^tasks/[^/]+/private/'; then
            echo '::error::Private task halves must never be committed to the public repo.'
            exit 1
          fi

  quality:
    name: Public-clone quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run check
