# Publishes bridgebench to npm when a maintainer pushes a v* tag.
#
# Security model (public repo, zero stored secrets):
#   - npm Trusted Publishing: the publish job authenticates to npm with a
#     short-lived GitHub OIDC token. There is NO npm token in repo secrets,
#     so there is nothing for a contributor, fork, or leaked log to steal.
#     Provenance attestations are generated automatically.
#   - The publish job runs in the `npm-publish` environment, which requires
#     manual reviewer approval and only accepts v* tags.
#   - Actions are pinned to commit SHAs so a hijacked upstream tag cannot
#     inject code into the release path.
#   - `prepack` (contamination check + build) runs inside both `npm pack`
#     and `npm publish`, so private task halves can never ship even if this
#     workflow is edited carelessly.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Release tag must point at a commit on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::${GITHUB_REF_NAME} does not point at a commit on main."
            exit 1
          fi

      - name: Release tag must match package.json version
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version v${version}."
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run contamination:check
      - run: npm run tasks -- validate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      # Packs the real tarball and asserts its contents (no raw src, no
      # compiled tests, no private task halves, both public packs present),
      # then installs it into throwaway ESM and CJS consumers.
      - run: npm run test:pack

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # OIDC exchange for npm trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing requires a recent npm CLI.
      - run: npm install -g npm@latest
      - run: npm ci

      - name: Publish (prerelease versions go to the "next" dist-tag)
        run: |
          version="$(node -p "require('./package.json').version")"
          case "$version" in
            *-*) dist_tag=next ;;
            *) dist_tag=latest ;;
          esac
          echo "Publishing bridgebench@${version} with dist-tag ${dist_tag}"
          npm publish --access public --tag "$dist_tag"
