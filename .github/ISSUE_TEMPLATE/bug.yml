name: Bug report
description: Report reproducible engine, CLI, dashboard, or documentation behavior.
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private paths, or active hidden references.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Arena engine
        - CLI
        - Dashboard
        - Task validation
        - Reports
        - Documentation
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest offline reproduction and sanitized output.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: BridgeBench revision
      placeholder: Commit SHA or release version
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: Node and npm versions, operating system
    validations:
      required: true
