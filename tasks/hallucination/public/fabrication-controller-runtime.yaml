id: fabrication-controller-runtime
version: 1.0.0
category: hallucination
cluster: entity-fabrication
difficulty: expert
title: Verify a Kubernetes Controller Plan Against an Exhaustive Runtime Surface
summary: Audit a reconciliation plan against a fictional controller framework's exact API, rejecting plausible but nonexistent helpers and repairing the plan with only documented primitives.
prompt: |
  `OrbitController 2.3` is fictional. [api-reference] is its exhaustive public surface; conventional
  controller-runtime names do not exist unless listed.

  1. Classify every method/type/option named in [proposed-code] as SUPPORTED or FABRICATED, with exact
     signatures for supported entities.
  2. Identify all semantic errors that remain even if fabricated names were added as aliases.
  3. Rewrite the watch registration and reconciliation skeleton using only the documented API,
     including owner mapping and status conflict handling.
  4. Give the exact retry behavior for NotFound, Conflict, Temporary, and all other errors.
  5. Determine whether finalizers run automatically and show the minimal supported deletion branch.
  6. Produce a compile-surface test table that asserts each tempting near-miss is absent and each used
     replacement is present.
artifacts:
  - id: api-reference
    type: spec
    label: Exhaustive OrbitController 2.3 public API
    content: |
      Types:
        Engine; Plan<T>; Request {namespace,name}; Outcome = Done | RetryAfter(Duration)
        Fault = Missing | RevisionConflict | Temporary(Duration) | Permanent(string)
      Engine methods:
        engine.plan<T>(kind: Kind<T>): Plan<T>
        engine.start(signal: AbortSignal): Promise<void>
      Plan methods:
        primary(): Plan<T>
        observe<U>(kind: Kind<U>, map: (u: U)=>Request[]): Plan<T>
        run(fn: (req: Request)=>Promise<Outcome>): Plan<T>
      Client methods:
        read<T>(kind,req): Promise<T> throws Missing
        applyStatus<T>(object, expectedRevision): Promise<T> throws RevisionConflict
        patchMetadata<T>(object, patch, expectedRevision): Promise<T>
      Helpers: owns(owner, child): boolean; retry(fault): Outcome

      `retry`: Missing->Done, RevisionConflict->RetryAfter(0), Temporary(d)->RetryAfter(d),
      Permanent->Done after error log. Finalizers have no automatic facility.
  - id: proposed-code
    type: code
    label: Migration plan using familiar names
    content: |
      NewControllerManagedBy(engine)
        .For(Widget)
        .Owns(Pod)
        .WithOptions({ MaxConcurrentReconciles: 8 })
        .Complete(async request => {
          const widget = await client.Get(request);
          if (widget.deletionTimestamp) return controller.UseFinalizer("widgets.io/cleanup");
          widget.status.ready = true;
          await client.Status().Update(widget);
          return Result.RequeueOnConflict();
        });
  - id: object-contract
    type: spec
    label: Widget reconciliation rules
    content: |
      Primary kind is Widget. Pod events enqueue their owning Widget only when `owns(widget,pod)`;
      owner request is `{namespace:pod.ownerNamespace,name:pod.ownerName}`. Status writes must use the
      revision read with the object. On deletion, if metadata finalizers contains
      `widgets.io/cleanup`, run idempotent cleanup then remove it with patchMetadata and expected
      revision. If absent, return Done.
  - id: near-miss-index
    type: table
    label: Names searched in package exports
    content: |
      NewControllerManagedBy | absent
      For                    | absent
      Owns                   | absent
      WithOptions            | absent
      Complete               | absent
      Get                    | absent
      Status                 | absent
      UseFinalizer           | absent
      Result                 | absent
      Plan.observe           | present
      Client.applyStatus     | present
      Client.patchMetadata   | present
  - id: runtime-notes
    type: log
    label: Observed failure modes
    content: |
      applyStatus expectedRevision=31 actual=32 -> RevisionConflict
      read Widget gone-7 -> Missing
      cleanup remote timeout -> Temporary(5s)
      malformed desired spec -> Permanent("invalid replicas")
      Engine has no concurrency option in 2.3; concurrency policy is outside this API packet.
tags: [kubernetes, controller, api-surface, fabrication, reconciliation]
