id: premise-migration-lock
version: 1.0.0
category: hallucination
cluster: false-premise
difficulty: expert
title: The Migration That Did Not Rewrite The Table
summary: A postmortem blames an ADD COLUMN NOT NULL for a full-table rewrite that locked writes for 38 minutes at peak, but the DDL used a constant default (metadata-only) and the real block was a non-concurrent CREATE INDEX run off-peak.
prompt: |
  inventory-service suffered a write outage on its stock_levels table during incident INC-6620.
  An on-call engineer filed a postmortem (see incident-summary). Using ALL artifacts, answer the
  six deliverables below.

  Some statements in the postmortem and in the deliverables themselves may be inaccurate. Before
  answering any deliverable, verify its premise against the hard evidence (migration-sql,
  pg-lock-log, write-error-table, deploy-timeline, traffic-table) and the locking rules in
  ddl-reference. If a deliverable rests on a false premise, say so explicitly, cite the
  contradicting evidence, correct the premise, then answer the corrected question if the
  artifacts allow. If a deliverable cannot be answered from the artifacts, state that and name
  exactly what is missing. Cite artifact ids for every claim.

  1. List, in execution order, the DDL statements that migration m-2087 ran against stock_levels.
  2. The ADD COLUMN reserved_qty NOT NULL forced a full-table rewrite that held an ACCESS
     EXCLUSIVE lock for the duration of the outage. Confirm the rewrite and state how long that
     ACCESS EXCLUSIVE lock was held.
  3. Identify what actually blocked writes to stock_levels, which lock mode was responsible, how
     long it was held, and the clock minute writes returned to healthy.
  4. The migration ran during peak traffic; confirm this and report the writes-per-minute at the
     time it ran.
  5. Report the number of consecutive clock minutes during which stock_levels writes were blocked.
  6. Report how many individual customer order-reservation writes failed during the outage.
artifacts:
  - id: incident-summary
    type: note
    label: On-call postmortem (unverified narrative)
    content: |
      Post-incident writeup for INC-6620, filed 09:40 UTC by t.okafor (on-call).

      Summary: At around peak load, migration m-2087 added a NOT NULL column (reserved_qty) to
      stock_levels. Because the column was NOT NULL, Postgres had to rewrite the entire table,
      taking an ACCESS EXCLUSIVE lock on stock_levels for the whole rewrite and blocking all
      writes for roughly 38 minutes until the rewrite finished. Order reservations failed for the
      duration. Root cause: adding a NOT NULL column to a large table forces a full-table rewrite
      under an exclusive lock, and we ran it during peak traffic.

      Recommendation: never add NOT NULL columns to big tables; always add them nullable, and
      never run migrations during peak hours.
  - id: migration-sql
    type: code
    label: Migration m-2087 (the applied DDL)
    content: |
      -- migrations/m-2087_stock_levels_reserved_qty.sql
      -- applied 2026-06-30 02:14 UTC by mig-worker against inventory-db-prod (single transaction)
      -- target engine: PostgreSQL 15 (see ddl-reference for lock semantics)

      BEGIN;

      -- Statement 1: add reserved_qty with a CONSTANT default of 0.
      ALTER TABLE stock_levels
        ADD COLUMN reserved_qty integer NOT NULL DEFAULT 0;

      -- Statement 2: build a plain (NON-CONCURRENT) index on sku.
      CREATE INDEX idx_stock_sku ON stock_levels (sku);

      COMMIT;

      -- Notes committed with this migration:
      --  * The DEFAULT is the constant literal 0 (not a volatile expression such as now() or a
      --    sequence), so Statement 1 is a metadata-only change on PostgreSQL 15.
      --  * Statement 2 is a plain CREATE INDEX, NOT "CREATE INDEX CONCURRENTLY". This migration
      --    file contains exactly these two DDL statements and no others.
  - id: pg-lock-log
    type: log
    label: PostgreSQL statement and lock log (inventory-db-prod)
    content: |
      inventory-db-prod PostgreSQL csvlog excerpt. Times UTC. txn 7781 = migration m-2087.
      02:14:00.010 LOG  statement: BEGIN  (backend pid 8801, application_name=mig-worker)
      02:14:00.020 LOG  statement: ALTER TABLE stock_levels ADD COLUMN reserved_qty integer NOT NULL DEFAULT 0;
      02:14:00.021 LOG  lock: relation stock_levels AccessExclusiveLock GRANTED to pid 8801
      02:14:00.030 DETAIL: ADD COLUMN with constant DEFAULT 0 recorded as a catalog-only default; no table rewrite performed (0 heap pages rewritten)
      02:14:00.032 LOG  duration: 12.4 ms  statement: ALTER TABLE stock_levels ADD COLUMN reserved_qty integer NOT NULL DEFAULT 0;
      02:14:00.033 LOG  lock: relation stock_levels AccessExclusiveLock RELEASED by pid 8801
      02:14:02.101 LOG  statement: CREATE INDEX idx_stock_sku ON stock_levels (sku);
      02:14:02.104 LOG  lock: relation stock_levels ShareLock GRANTED to pid 8801 (blocks INSERT/UPDATE/DELETE; SELECT still permitted)
      02:14:03.010 LOG  process 9002 (INSERT INTO stock_levels ...) waiting for RowExclusiveLock; blocked by ShareLock held by pid 8801 (CREATE INDEX)
      02:14:03.221 LOG  process 9014 (UPDATE stock_levels ...) waiting for RowExclusiveLock; blocked by ShareLock held by pid 8801 (CREATE INDEX)
      02:20:11.400 LOG  process 9101 (SELECT ... FROM stock_levels) acquired AccessShareLock (reads unaffected; compatible with ShareLock)
      02:52:10.400 LOG  duration: 2288299 ms  statement: CREATE INDEX idx_stock_sku ON stock_levels (sku);
      02:52:10.402 LOG  lock: relation stock_levels ShareLock RELEASED by pid 8801
      02:52:10.410 LOG  process 9002 (INSERT INTO stock_levels ...) acquired RowExclusiveLock after 2287.4 s wait
      02:52:10.900 LOG  statement: COMMIT  (backend pid 8801, txn 7781 complete)
      -- Reading guide: the only AccessExclusiveLock on stock_levels in this window was the 12.4 ms
      -- ADD COLUMN. The 38-minute writer block was the ShareLock held by the plain CREATE INDEX.
  - id: write-error-table
    type: table
    label: stock_levels write and read error rate, minute by minute
    content: |
      stock_levels error rates by clock minute (UTC). "Blocked" writes are ones rejected/queued
      because they could not acquire RowExclusiveLock. This table reports PERCENTAGES only; it
      contains no absolute request, write, or order counts.
      minute  write_error_pct  read_error_pct
      02:11   0.0              0.0
      02:12   0.0              0.0
      02:13   0.0              0.0
      02:14   96.5             0.0
      02:15   100.0            0.0
      02:20   100.0            0.0
      02:30   100.0            0.0
      02:40   100.0            0.0
      02:50   100.0            0.0
      02:51   100.0            0.0
      02:52   61.2             0.0
      02:53   0.0              0.0
      02:54   0.0              0.0
      Every minute from 02:15 through 02:51 (not all printed above) held write_error_pct=100.0.
      Writes were blocked for the 39 consecutive clock minutes 02:14 through 02:52 inclusive, and
      healthy again from 02:53. read_error_pct stayed 0.0 the entire time: reads were never
      blocked, so no read-blocking (ACCESS EXCLUSIVE) lock was held for any sustained period.
  - id: ddl-reference
    type: spec
    label: PostgreSQL 15 DDL locking reference (authoritative for this DB)
    content: |
      PostgreSQL 15 DDL locking reference — the complete set of locking rules relevant to
      m-2087. inventory-db-prod runs PostgreSQL 15.

      ADD COLUMN:
        - Adding a column always takes a brief ACCESS EXCLUSIVE lock to update the catalog.
        - If the DEFAULT is a CONSTANT (non-volatile) expression, the change is METADATA-ONLY:
          the existing rows are NOT rewritten, so the lock is held only for the catalog update
          (milliseconds), regardless of table size or the NOT NULL constraint. A constant default
          plus NOT NULL does NOT trigger a table rewrite on PostgreSQL 15.
        - A table rewrite (and a long ACCESS EXCLUSIVE hold) occurs only for a VOLATILE default
          (e.g. now(), a sequence, random()) or a type change that rewrites the heap. m-2087's
          default is the constant 0, so neither applies.

      CREATE INDEX (plain, non-concurrent):
        - Takes a SHARE lock on the table for the full duration of the index build.
        - SHARE conflicts with ROW EXCLUSIVE (held by INSERT/UPDATE/DELETE), so all writes block
          until the build commits. SHARE does NOT conflict with ACCESS SHARE, so SELECT (reads)
          continue normally throughout the build.

      CREATE INDEX CONCURRENTLY:
        - Does NOT take a SHARE lock and does not block writes, but cannot run inside a
          transaction block. m-2087 used plain CREATE INDEX inside a transaction, not CONCURRENTLY.

      Consequence for diagnosis: a sustained WRITE-only outage (reads healthy) on this engine
      matches a plain CREATE INDEX SHARE lock, not an ADD COLUMN, and not a rewrite (a rewrite's
      ACCESS EXCLUSIVE lock would block reads too).
  - id: deploy-timeline
    type: log
    label: inventory change timeline (01:00-03:00 UTC)
    content: |
      Authoritative change timeline for inventory-service and inventory-db-prod, 2026-06-30
      01:00-03:00 UTC. This list is exhaustive: there were no other deploys, migrations, config
      changes, or manual DB operations in this window.
      01:50:00 deploy: inventory-service app v3.4.0 -> prod (application code only; NO schema
               change, NO DB migration). Writes remained healthy after this deploy (see
               write-error-table: 0.0 through 02:13).
      02:05:00 maintenance: scheduled ANALYZE stock_levels (routine statistics refresh, ~4 s,
               takes only a lightweight lock; does not block writes).
      02:14:00 migration: m-2087 applied by mig-worker (see migration-sql and pg-lock-log).
      02:53:00 status: stock_levels writes fully healthy; incident INC-6620 closed.
      Window note: 02:00-03:00 UTC is the nightly low-traffic trough (see traffic-table); the
      daily write peak is ~14:00 UTC. m-2087 was applied at 02:14, in the trough.
  - id: traffic-table
    type: table
    label: stock_levels write volume by hour (UTC)
    content: |
      stock_levels average writes per minute, by hour of day (UTC), typical weekday. Provided so
      "peak" vs "off-peak" is decidable from the data.
      hour   avg_writes_per_min
      00:00  41
      01:00  30
      02:00  22
      03:00  27
      08:00  610
      13:00  900
      14:00  1180
      15:00  1050
      20:00  480
      Peak write load is ~14:00 UTC (~1180/min). The nightly trough is ~02:00-03:00 UTC (~22/min).
      The migration ran at 02:14 UTC, inside the trough, at roughly 22 writes/min — about 1/50th
      of the ~1180/min daily peak. It did NOT run at peak.
  - id: chat-thread
    type: note
    label: Incident channel transcript (mixed signals)
    content: |
      #inc-6620 channel (times UTC):
      02:16 oncall(t.okafor): stock_levels writes are all failing. we just ran m-2087 — the ADD
             COLUMN NOT NULL must be rewriting the whole table under an exclusive lock.
      02:19 dba(r.mensah): the ADD COLUMN already finished — 12ms, catalog-only, constant default,
             no rewrite. that's not it.
      02:21 dba(r.mensah): what's holding the lock is the plain CREATE INDEX in the same migration.
             non-concurrent index build takes a SHARE lock, which blocks writes but not reads.
      02:23 oncall(t.okafor): reads do look fine on the dashboard actually.
      02:24 dba(r.mensah): right — if it were a rewrite's ACCESS EXCLUSIVE, reads would be blocked
             too. reads are green, so it's the index build's SHARE lock, not a rewrite.
      02:52 dba(r.mensah): index build just committed, lock released, writes recovering now.
      02:55 oncall(t.okafor): also this ran at 02:14, not peak — peak is ~14:00. i'll fix the
             writeup. the "rewrite at peak" framing is wrong on both counts.
      09:45 dba(r.mensah): for the postmortem: fix is CREATE INDEX CONCURRENTLY next time; the
             NOT NULL column and the timing were both red herrings.
tags: [false-premise, postgres, migration, locking, incident]
