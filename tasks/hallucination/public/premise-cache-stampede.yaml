id: premise-cache-stampede
version: 1.1.0
category: hallucination
cluster: false-premise
difficulty: expert
title: Post-Incident Review of the INC-8812 Cache Stampede Writeup
summary: An incident report claims a Redis restart caused a 100% cache miss rate and
  stampeded the database, exacerbated by a missing TTL jitter on the user-profile
  service. Verify the writeup's claims against the attached logs, metrics, and
  configuration, then answer six deliverables.
prompt: |-
  The user-profile service database (user-db-prod) experienced connection exhaustion and high CPU during incident INC-8812.
  An on-call engineer filed a postmortem (see incident-summary). Using ALL artifacts, answer the six deliverables below.

  Some statements in the postmortem and in the deliverables themselves may be inaccurate. Before answering any deliverable, verify its premise against the hard evidence (redis-server-log, redis-metrics, db-connection-stats, batch-exporter-config, user-profile-cache). If a deliverable rests on a false premise, say so explicitly, cite the contradicting evidence, correct the premise, then answer the corrected question if the artifacts allow. If a deliverable cannot be answered from the artifacts, state that and name exactly what is missing. Cite artifact ids for every claim.

  1. State the exact time the DB connections reached the maximum pool size of 500.
  2. The Redis restart at 04:00 UTC caused a 0% cache hit rate for 5 minutes. Confirm this and state the exact Redis downtime in seconds.
  3. The user-profile service lacks a TTL jitter, which contributed to the stampede. Confirm this and report the configured TTL.
  4. Identify which service actually exhausted the DB connection pool at 04:00 UTC.
  5. State the cron schedule for the batch-exporter job.
  6. Report the total number of queries executed by batch-exporter during the 04:00 outage.
artifacts:
- id: incident-summary
  type: note
  label: On-call postmortem
  content: |-
    Post-incident writeup for INC-8812, filed 09:15 UTC by k.williams.

    Summary: At 04:00 UTC, the Redis cache cluster restarted unexpectedly. This caused a 100% cache miss rate for the user-profile service, leading to a massive cache stampede directly to user-db-prod. The database connection pool was exhausted (reached 500), causing an outage for 10 minutes.

    Contributing factors: The user-profile cache configuration has a static TTL of 300s with no jitter. When Redis came back online, all keys expired simultaneously, worsening the stampede.

    Action items: Add TTL jitter to user-profile service, investigate Redis stability.
- id: redis-server-log
  type: log
  label: Redis cluster server log
  content: |-
    redis-cluster-prod log excerpt (UTC).
    01:15:00 LOG Background RDB transfer terminated with success
    02:30:00 LOG Background append only file rewrite started by pid 10992
    02:30:15 LOG AOF rewrite child asks to stop sending diffs.
    02:30:15 LOG Background AOF rewrite terminated with success
    03:45:00 LOG 10000 changes in 60 seconds. Saving...
    03:45:01 LOG Background saving terminated with success
    04:15:00 LOG 10000 changes in 60 seconds. Saving...
    04:15:01 LOG Background saving terminated with success

    Note: This excerpt is the complete redis-cluster-prod log for the window shown; no events have been omitted. Server uptime counter at time of capture: 45 days.
- id: redis-metrics
  type: table
  label: Redis cache hit rate
  content: |-
    Redis cache hit rate for user-profile keys, by minute (UTC).
    minute  hit_rate_pct
    03:58   98.5
    03:59   98.2
    04:00   98.4
    04:01   98.6
    04:02   98.1
    04:03   98.3
    04:04   98.5
    04:05   98.4

    This table is the complete per-minute hit-rate series for the window shown.
- id: db-connection-stats
  type: table
  label: DB connection counts by service
  content: |-
    user-db-prod connection pool utilization by client application (UTC).
    minute  user-profile  batch-exporter  total_used  pool_max
    03:58   22            0               22          500
    03:59   25            0               25          500
    04:00   24            476             500         500
    04:01   21            479             500         500
    04:02   23            477             500         500
    04:03   22            478             500         500
    04:04   24            476             500         500
    04:05   25            0               25          500

    This table is the complete per-service connection breakdown for the window shown; no client applications have been omitted.
- id: batch-exporter-config
  type: config
  label: batch-exporter configuration
  content: |-
    ---
    # batch-exporter-config.yml
    service: batch-exporter
    target_db: user-db-prod
    concurrency: 500
    schedule:
      cron: "0 4 * * *" # Runs daily at 04:00 UTC
      timeout_seconds: 300
    cache:
      enabled: false
      use_replica: false
- id: user-profile-cache
  type: config
  label: user-profile cache configuration
  content: |-
    ---
    # user-profile-cache.yml
    cache:
      provider: redis
      cluster: redis-cluster-prod
      ttl_seconds: 300
      jitter_seconds: 60
      fallback_to_db_on_error: true
      max_connections: 50
tags:
- false-premise
- redis
- database
- incident
