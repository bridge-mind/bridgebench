      2026-06-13  500
      2026-06-14  505
      2026-06-15  503
      2026-06-16  504
      /v3/suggest does not use the ranker. This table is the complete /v3/suggest p95 series for
      the dates shown.
  - id: service-p99-history
    type: table
    label: Service-wide aggregate p99 (all endpoints)
    content: |
      Service-wide aggregate p99 latency, milliseconds, all /v3/* endpoints combined, daily:
      date        p99_all
      2026-06-05  1183
      2026-06-06  1191
      2026-06-07  1180
