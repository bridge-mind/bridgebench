id: boundary-sbom-remediation
version: 1.0.0
category: hallucination
cluster: knowledge-boundary
difficulty: expert
title: SBOM Vulnerability Remediation Audit Without Inventing Reachability or Deployment Status
summary: Reconcile an image SBOM, advisory ranges, lockfile paths, scanner output, patch commit, and deployment inventory while preserving boundaries around exploitability and rollout.
prompt: |
  Audit `report-api` for advisory CVE-FICTION-2042 using only the supplied retained packet. The advisory
  and evidence manifest are authoritative only for their stated scopes.

  1. Identify every affected component instance in image digest `sha256:aaa`, including version and
     dependency path.
  2. Determine whether image `sha256:bbb` contains an affected version and cite exact SBOM evidence.
  3. State what commit p91 changes and whether that proves a fixed image is deployed.
  4. Is the vulnerable parser reachable from untrusted production input? Give SUPPORTED or NOT
     DETERMINABLE and list the exact missing artifacts.
  5. Which environments are proven to run each digest at capture time? Do not infer unlisted clusters.
  6. Audit every assertion in [release-message] as SUPPORTED, CONTRADICTED, or NOT DETERMINABLE and
     provide a minimally accurate replacement status.
artifacts:
  - id: advisory
    type: spec
    label: Fictional security advisory
    content: |
      CVE-FICTION-2042 affects `packet-parse` >=3.1.0 and <3.1.4 when `decodeExtendedHeader` receives an
      attacker-controlled extended header. Fixed in 3.1.4. Presence of the package alone proves
      affected inventory, not runtime reachability or exploitability.
  - id: sbom-a
    type: table
    label: Complete CycloneDX projection for sha256:aaa
    content: |
      component                | version | dependency path
      report-api               | 8.2.0   | root
      packet-parse             | 3.1.2   | report-api>upload-kit>packet-parse
      packet-parse             | 2.9.9   | report-api>legacy-export>packet-parse
      upload-kit               | 5.0.0   | report-api>upload-kit
  - id: sbom-b
    type: table
    label: Complete CycloneDX projection for sha256:bbb
    content: |
      component                | version | dependency path
      report-api               | 8.2.1   | root
      packet-parse             | 3.1.4   | report-api>upload-kit>packet-parse
      packet-parse             | 2.9.9   | report-api>legacy-export>packet-parse
      upload-kit               | 5.0.1   | report-api>upload-kit
  - id: patch-commit
    type: diff
    label: Commit p91 merged to main
    content: |
      package-lock.json:
      - upload-kit/packet-parse 3.1.2
      + upload-kit/packet-parse 3.1.4
      package.json version 8.2.0 -> 8.2.1

      CI record: image sha256:bbb built and signed. A merge/build record is not a deployment record.
  - id: deployment-inventory
    type: config
    label: Captured deployment state at 2026-07-19T12:00Z
    content: |
      prod-us/report-api: sha256:aaa
      staging/report-api: sha256:bbb
      dev-local: not inventoried
      Inventory scope is exactly prod-us and staging; no prod-eu record is retained.
  - id: scanner-and-boundary
    type: log
    label: Scanner result and exhaustive missing evidence
    content: |
      scanner sha256:aaa: packet-parse@3.1.2 MATCH CVE-FICTION-2042; reachability=UNKNOWN
      scanner sha256:bbb: no affected-version match

      No route map, call graph, runtime trace, feature-flag state, WAF rule, exploit test, prod-eu
      inventory, or completed rollout record is included. Therefore runtime reachability and global
      deployment cannot be inferred.
  - id: release-message
    type: note
    label: Proposed status announcement
    content: |
      "CVE-FICTION-2042 was remotely exploitable in all production regions. Commit p91 fully remediated
      production, and no vulnerable packet-parse versions remain anywhere. The legacy 2.9.9 copy was
      also vulnerable. Staging is still waiting for the fix."
tags: [sbom, supply-chain, vulnerability, knowledge-boundary, deployment]
