      Semver ordering (compare each dotted field numerically, NOT as text)
        v2.3.0 < v2.3.1 < v2.3.2 < v2.3.3 < v2.3.10 < v2.3.11
        The patch field 11 is greater than 2, 1, and 0, so v2.3.11 is the NEWEST
        tag. A text sort would wrongly place v2.3.11 right after v2.3.1.
  - id: commit-reference
    type: note
    label: Commit reference and near-duplicate index
    content: |
      Commit reference and near-duplicate index (harbor-lease, 2.3.x). This note
      flags which identifiers in the history are easy to confuse; consult the raw
      artifacts to establish what each commit actually did.

      Confusable short SHAs (each pair differs by transposed characters or a
      single character; the two commits in each pair are distinct)
        - 9f3ab21 vs 9f3ba12
        - 7e2f5c8 vs 7e2f5c3
        - 3b9e6d7 vs 3b9e6d4

      Near-duplicate commit subjects (distinct commits, not the same change)
        - "feat: batch lease renewals in a single round-trip" vs
          "feat: batch lease renewals behind a flag"
        - "fix: handle empty lease renewals" (plural) vs
          "fix: handle empty lease renewal" (singular)
        - Revert "feat: batch lease renewals in a single round-trip" vs
          Revert "feat: batch lease renewals behind a flag"

      CHANGELOG versus commit subjects
