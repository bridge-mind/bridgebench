id: boundary-pagination-contract
version: 1.0.0
category: hallucination
cluster: knowledge-boundary
difficulty: expert
title: Pagination Stability Audit at the Boundary of the Retained API Evidence
summary: Audit cursor stability, snapshot semantics, limits, and SDK behavior while refusing to infer production guarantees absent from the exhaustive evidence manifest.
prompt: |
  Answer only from the retained evidence. [evidence-boundary] is exhaustive and defines when to say
  NOT DETERMINABLE rather than extrapolating from conventional cursor designs.

  1. State the documented ordering and cursor payload for `/v2/jobs`, preserving every tie-break field.
  2. Determine whether inserts after page 1 can appear on later pages of the same traversal.
  3. Determine whether deletes can cause a remaining job to be skipped, and distinguish what the code
     proves from what production history would require.
  4. Give server default/max limits and the TypeScript SDK's requested limit for the shown call.
  5. Can a cursor minted in region east be resumed in west after failover? Give the strongest supported
     answer and list the missing evidence.
  6. Produce a claim audit table for [support-ticket], marking each SUPPORTED, CONTRADICTED, or NOT
     DETERMINABLE with artifact citations and no invented SLA.
artifacts:
  - id: api-spec
    type: spec
    label: Versioned API contract
    content: |
      GET /v2/jobs?after=<opaque>&limit=<n>
      order: created_at DESC, id DESC
      default limit: 50; maximum: 200
      cursor: opaque base64url encoding of JSON {createdAt:string,id:string}
      response: {items: Job[], next: string|null}

      The contract does not promise a database snapshot across pages or cross-region resumability.
  - id: handler-code
    type: code
    label: Deployed source at retained commit 18fa2d1
    content: |
      const limit = Math.min(parsePositiveInt(q.limit) ?? 50, 200);
      const c = q.after ? Cursor.parse(q.after) : null;
      return db.jobs.findMany({
        where: c ? sql`(created_at,id) < (${c.createdAt},${c.id})` : undefined,
        orderBy: [desc(jobs.createdAt), desc(jobs.id)], limit: limit + 1
      });

      Cursor.parse authenticates the payload with `cursorKey.current`. Key distribution is not shown.
  - id: sdk-code
    type: code
    label: TypeScript SDK 6.4 iterator
    content: |
      async function* jobs(client) {
        let after;
        do {
          const page = await client.get("/v2/jobs", { after, limit: 100 });
          yield* page.items;
          after = page.next;
        } while (after);
      }
  - id: test-record
    type: log
    label: Retained unit tests
    content: |
      PASS equal timestamps use descending id tie-break
      PASS insert newer than page-1 cursor does not appear on page 2
      PASS deleting the cursor row still returns older rows in fixture
      Tests use one in-memory database and one cursor key; no failover, concurrency, or production
      history test is retained.
  - id: evidence-boundary
    type: spec
    label: Exhaustive evidence manifest
    content: |
      Included: API spec, one deployed handler commit, SDK iterator, unit tests, ticket. Absent: database
      isolation setting, transaction boundaries across requests, east/west cursor-key configuration,
      key rotation history, production query logs, and an availability/SLA document. Code behavior on
      the shown commit may be stated; guarantees requiring absent runtime/config/history are NOT
      DETERMINABLE.
  - id: support-ticket
    type: note
    label: Claims to audit
    content: |
      A. "The API gives a repeatable-read snapshot for the whole traversal."
      B. "A newer inserted job is excluded from page 2 by the keyset predicate."
      C. "Deleting any job can never skip another job in production."
      D. "Cursors work in every region for exactly 24 hours."
      E. "The SDK always asks for 100 jobs per page."
tags: [pagination, cursor, evidence-boundary, api-contract, hallucination]
