id: premise-sql-injection
version: 1.0.0
category: hallucination
cluster: false-premise
difficulty: expert
title: Correct an Incident Claiming SQL Injection Through a Parameterized Query
summary: Reject an injection premise using driver wire logs and validation, then trace the real cross-tenant cache-key collision without minimizing the security impact.
prompt: |
  A draft blames SQL injection for tenant `birch` receiving tenant `cedar`'s invoice. Correct the
  premise and determine the actual access-control failure using only the packet.

  1. Classify every factual claim in [draft] as supported, contradicted, or unsupported with citations.
  2. Show exactly how the driver sends the suspicious invoice ID and why it cannot alter this query's
     SQL structure under the stated protocol.
  3. Reconstruct requests q1 and q2 through auth, cache, and database, including cache keys and returned
     tenant IDs.
  4. Identify the root defect, violated tenant-isolation invariant, and security severity; distinguish
     it from the harmless-looking trigger value.
  5. Evaluate patches A-D, selecting all required changes for fail-closed tenant isolation and
     explaining the first failure of every rejected patch.
  6. Provide a corrected incident paragraph and three security tests covering parameter binding,
     cross-tenant cache isolation, and ownership enforcement on cache miss.
artifacts:
  - id: query-code
    type: code
    label: Deployed request path
    content: |
      async function getInvoice(req) {
        const actor = await requireAuth(req); // verified tenantId from signed session
        const id = InvoiceId.parse(req.params.id); // 1..80 printable chars
        const key = `invoice:${id}`;               // BUG: tenant omitted
        const cached = await cache.get(key);
        if (cached) return cached;
        const row = await db.query(
          "SELECT id, tenant_id, total FROM invoices WHERE id=$1 AND tenant_id=$2",
          [id, actor.tenantId]
        );
        if (!row) throw NotFound;
        await cache.set(key, row, 300);
        return row;
      }
  - id: driver-contract
    type: spec
    label: Extended query protocol
    content: |
      SQL text and parameter values are transmitted in separate Parse and Bind messages. `$1` and `$2`
      are data values; quotes, semicolons, comments, and SQL keywords within them are never reparsed as
      SQL. The wire log is exhaustive. Authentication fails closed before cache access.
  - id: request-trace
    type: table
    label: Complete incident sequence
    content: |
      q1 actorTenant=cedar id=`inv-7' OR '1'='1` cache MISS
         Parse SQL exactly as [query-code]
         Bind $1=`inv-7' OR '1'='1`, $2=`cedar`
         DB returns {id:suspicious-value,tenant_id:cedar,total:900}; cache set key
         `invoice:inv-7' OR '1'='1`
      q2 actorTenant=birch id=`inv-7' OR '1'='1` cache HIT same key
         returned cached {tenant_id:cedar,total:900}; no DB query
  - id: invariants
    type: spec
    label: Security contracts
    content: |
      An authenticated actor may receive an invoice only when row.tenant_id equals actor.tenantId.
      Cache keys for tenant-owned data must include trusted tenant identity, and cached values must be
      ownership-checked before return as defense in depth. Cache hit must not bypass authorization.
  - id: draft
    type: note
    label: Proposed incident narrative
    content: |
      "An unauthenticated attacker injected OR 1=1, making PostgreSQL return every invoice. The cache
      and tenant filter worked correctly. Blocking apostrophes fixes the issue; no authorization bug
      occurred because q2 never queried the database. Impact was low."
  - id: candidate-patches
    type: diff
    label: Proposed fixes
    content: |
      A. Key cache as `invoice:${actor.tenantId}:${id}` and reject cached rows whose tenant_id differs.
      B. On miss retain the parameterized query scoped by tenant_id.
      C. Remove tenant_id predicate because cache keys are sufficient authorization.
      D. Escape apostrophes and continue using global cache key.
      Operational response: purge existing invoice cache entries and audit cross-tenant cache hits.
tags: [false-premise, sql-injection, idor, cache, tenant-isolation]
