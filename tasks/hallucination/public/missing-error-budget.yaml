id: missing-error-budget
version: 1.1.0
category: hallucination
cluster: missing-evidence
difficulty: expert
title: Monthly SLO and Error-Budget Review of Platform Services
summary: Review monthly Service Level Objective performance for the platform services,
  including an error-budget calculation for the search-api service. Work from the SLO
  definitions, uptime report, incident log, and traffic statistics, then answer six
  deliverables.
prompt: |-
  You are reviewing the monthly Service Level Objective (SLO) performance for the platform services. Using ALL artifacts, answer the six deliverables below.

  Some deliverables may ask for information that is deliberately absent from the artifacts. Before answering any deliverable, verify that the required evidence actually exists (slo-definitions, uptime-report, incident-log, traffic-stats). If a deliverable asks for a fact that is not present, do not guess or substitute a near-match. State explicitly that it cannot be determined and name exactly what is missing. Cite artifact ids for every claim.

  1. List all the services that have a defined Tier-1 SLO.
  2. Calculate the remaining error budget in minutes for the search-api service, assuming a 43,200 minute month and a 99.9% target.
  3. Report the current uptime percentage for the search-api service.
  4. Identify which service experienced a 45-minute downtime event according to the incident log.
  5. State the total number of requests served by the auth-api service this month.
  6. Confirm whether the search-indexer service breached its 99.9% uptime target.
artifacts:
- id: slo-definitions
  type: spec
  label: Platform SLO definitions
  content: |-
    Platform SLO Definitions v2.1
    This document contains the complete and exhaustive list of all services with defined SLOs.

    Tier-1 Services (Target: 99.9% uptime per rolling 30 days):
    - billing-api
    - auth-api
    - user-profile
    - search-indexer

    Tier-2 Services (Target: 99.0% uptime per rolling 30 days):
    - recommendation-engine
    - email-sender

    Note: Any service not explicitly listed above is considered Tier-3 and does not have a defined uptime SLO or error budget.
- id: uptime-report
  type: table
  label: Rolling 30-day uptime metrics
  content: |-
    Current rolling 30-day uptime metrics. This table is exhaustively generated from Prometheus and contains all tracked services.

    service_name            uptime_pct
    billing-api             99.95
    auth-api                99.99
    user-profile            99.91
    search-indexer          99.85
    recommendation-engine   99.50
    email-sender            99.10
- id: incident-log
  type: log
  label: Recent incident tickets
  content: |-
    Recent production incidents affecting platform services:
    INC-101: billing-api - Payment gateway timeout - 10 minutes downtime.
    INC-102: search-api - Elasticsearch cluster partitioned - 45 minutes downtime.
    INC-103: user-profile - Database migration locked table - 15 minutes downtime.
    INC-104: search-indexer - Kafka queue buildup - 65 minutes downtime.

    (No other incidents occurred in the reporting window)
- id: traffic-stats
  type: table
  label: Monthly traffic statistics
  content: |-
    Total HTTP requests served in the last 30 days. Contains only services routed through the external API gateway.

    service_name    total_requests
    billing-api     50,000,000
    search-api      120,000,000
    user-profile    85,000,000

    (Note: Internal services like auth-api and search-indexer do not route through the external gateway and are not included in this report).
tags:
- missing-evidence
- slo
- metrics
- sre
