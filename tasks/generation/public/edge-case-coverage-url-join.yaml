  - id: reviewer-thread
    type: note
    label: code-review discussion on the six submissions
    content: |
      Review thread for urlJoin (PR #2056).

      @sophia: "candidate-2 is extremely clean and short. Collapsing all duplicate slashes with
      a single regex replacement on the output is the standard and safest way to handle path errors
      without complex array parsing."

      @ethan: "That regex replaces any sequence of duplicate slashes except those preceded by a colon.
      But what if base is a protocol-relative URL like `//api.io`? It has no colon, so it collapses to
      `/api.io` which totally changes it from protocol-relative to a local path."

      @lucas: "Also, one of the submissions doesn't protect the domain name from directory traversal.
      If base is `http://api.io/v1` and we join `../../posts`, we should get `http://api.io/posts` (the parent of
      v1 is root, and we can't go higher). A broken candidate will go up too far and output `http://posts`!"
