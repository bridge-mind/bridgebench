        } else if (isProtoRelative) {
          prefix = '//';
          rest = base.slice(2);
        }
        if (path.startsWith('?') || path.startsWith('#')) {
          return base + path;
        }
        let joined = rest.replace(/\/+$/, '') + '/' + path.replace(/^\/+/, '');
        const parts = joined.split('/');
        const stack = [];
        for (let i = 0; i < parts.length; i++) {
          const p = parts[i];
          if (p === '..') {
            stack.pop();
          } else if (p !== '.' && p !== '') {
            stack.push(p);
          }
        }
        return prefix + stack.join('/');
      }
