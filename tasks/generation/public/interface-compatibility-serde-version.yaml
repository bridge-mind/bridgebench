  - id: candidate-e
    type: code
    label: candidate-e
    content: |
      // candidate-e
      function parseConfig(raw) {
        const ver = raw.version || 1;
        const valid = {
          1: new Set(['version', 'host', 'port', 'feature_list', 'timeout']),
          2: new Set(['version', 'server', 'features', 'timeoutMs']),
          3: new Set(['version', 'server', 'features', 'timeoutMs'])
        };

        const keys = valid[ver];
        if (!keys) throw 'invalid_value';
        for (const k of Object.keys(raw)) {
          if (!keys.has(k)) throw 'unrecognized_key';
        }

        const res = { version: 3, server: { host: 'localhost', port: 8080 }, features: [], timeoutMs: 30000 };

        switch (ver) {
          case 1:
            if ('host' in raw) res.server.host = raw.host;
            if ('port' in raw) res.server.port = Number(raw.port);
            if ('timeout' in raw) res.timeoutMs = raw.timeout * 1000;
            if ('feature_list' in raw && raw.feature_list !== '') {
              res.features = raw.feature_list.split(',').filter(x => x !== '');
            }
            break;
          case 2:
          case 3:
            if (raw.server) {
              if ('host' in raw.server) res.server.host = raw.server.host;
              if ('port' in raw.server) res.server.port = Number(raw.server.port);
            }
            if ('features' in raw) res.features = raw.features;
            if ('timeoutMs' in raw) res.timeoutMs = raw.timeoutMs;
            break;
        }

        if (typeof res.server.host !== 'string') throw 'invalid_value';
        if (!Number.isInteger(res.server.port) || res.server.port < 1 || res.server.port > 65535) throw 'invalid_value';
        if (typeof res.timeoutMs !== 'number' || res.timeoutMs <= 0) throw 'invalid_value';
        if (!Array.isArray(res.features) || res.features.some(f => typeof f !== 'string')) throw 'invalid_value';

        return res;
      }
  - id: judging-notes
    type: note
    label: how to judge (config mapping and validation rules)
    content: |
      Scope: candidate-a … candidate-e are the COMPLETE set of proposals.

      Validation details:
        - U1: An empty feature_list string "" or undefined must resolve to []. But `split(",")` on an empty string
          returns `[""]` (an array containing an empty string), which is incorrect and violates the feature list specification.
        - U2: If `version === 2`, the port can be a string and must be coerced. Under Javascript, `Number.isInteger("8080")` is
          false, so any candidate that fails to run a conversion like `Number()` will throw "invalid_value" on valid string ports.
        - U4: Unrecognized top-level keys must be actively blocked. If a candidate accepts an input with an unknown key
          and returns a config object instead of throwing "unrecognized_key", it violates the schema-drift protection.
