  - id: reviewer-thread
    type: note
    label: review comments on bulk handlers
    content: |
      Review thread for POST /v1/bulk/users (PR #8199).

      @kai: "candidate-2 should win. HTTP 207 is the right protocol-level status for mixed per-item
      outcomes."

      @lena: "This endpoint contract explicitly standardizes on HTTP 200 and puts per-item outcome in
      the response body for compatibility with existing clients."

      @dean: "One candidate exits early after an invalid row, so downstream valid items never produce
      results. That breaks the full-results guarantee."
  - id: submission-manifest
    type: note
    label: submission manifest and acceptance rule
    content: |
      Submissions under review: candidate-1, candidate-2, candidate-3, candidate-4, candidate-5,
      candidate-6. This is the COMPLETE set; no other implementation is being considered.

      Acceptance rule: each submission is evaluated against terms T1..T5 and canonical-scenario;
      submissions that satisfy every term are accepted.
