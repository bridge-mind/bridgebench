            break;
          }
          const id = createUser(item);
          existingEmails.add(item.email);
          results.push({ clientId: item.clientId, status: 'created', userId: id });
        }
        return { status: 200, body: { results } };
      }

      // ---- candidate-6 ----
      function candidate6(items, existingEmails) {
        const results = [];
        for (const item of items) {
          if (!isEmail(item.email)) {
