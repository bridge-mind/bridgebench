  - id: candidate-e
    type: code
    label: candidate-e
    content: |
      // candidate-e
      function mergeIntervals(intervals) {
        if (intervals.length <= 1) return intervals.slice();
        const sorted = intervals.slice().sort((a, b) => a[0] - b[0] || a[1] - b[1]);
        return sorted.reduce((acc, curr) => {
          if (acc.length === 0) return [curr];
          const last = acc[acc.length - 1];
          if (curr[0] <= last[1]) {
            last[1] = Math.max(last[1], curr[1]);
          } else {
            acc.push(curr);
          }
          return acc;
        }, []);
      }
  - id: judging-notes
    type: note
    label: how to judge (edge-case and sorting rules)
    content: |
      Scope for this task:
        - candidate-a … candidate-e are the COMPLETE set of submissions.
        - worked-examples is the complete reference set.

      Algorithmic properties to verify:
        - Unsorted inputs must be sorted ascending by start time first. If sorting is skipped, intervals that should
          be merged will remain separated if they are not contiguous in the input.
        - Overlapping ranges include those that are adjacent on a shared boundary (e.g. s2 === e1). This requires `<=`
          for comparison rather than strictly `<`.
        - Fully nested intervals require that the end time of the merged interval remains the maximum of the two (i.e.,
          `max(last[1], curr[1])`). If we blindly assign `last[1] = curr[1]`, the nested interval [2, 5] inside [1, 10]
          will erroneously contract the merged end to 5 instead of keeping it at 10.
