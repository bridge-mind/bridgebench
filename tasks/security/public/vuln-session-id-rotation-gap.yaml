id: vuln-session-id-rotation-gap
version: 1.0.0
category: security
cluster: vuln-discovery
difficulty: expert
title: Support Portal Login Preserves an Attacker-Planted Session Identifier
summary: >-
  A multi-file support portal login flow contains one exploitable session-management defect among
  plausible CSRF, cookie, password-hashing, and redirect findings. Reconstruct the pre-auth and
  post-auth session lifecycle, use the captured two-browser trace, and identify what is actually
  vulnerable, what is benign, and the minimal invariant the repair must enforce.
prompt: |
  Review the fictional HelpHarbor portal using ONLY the supplied artifacts. Cite artifact ids for
  every verdict. Use the verdicts vulnerable and not-a-vulnerability. Do not provide attack payloads
  or operational exploitation steps; reason only about reachability, preconditions, and impact.

  1. Identify the single confirmed vulnerability. Trace the complete attacker-controlled value from
     its source before authentication to the authenticated lookup that makes the issue exploitable.
  2. State the attacker preconditions and the exact authenticated capability obtained. Explain why
     knowing a pre-login identifier is sufficient even though the password and MFA code remain secret.
  3. Classify each scanner claim in scanner-report as vulnerable or not-a-vulnerability: missing CSRF,
     weak password hashing, insecure cookie attributes, open redirect, and session fixation.
  4. Explain why the OAuth state comparison and the post-login redirect are not alternate attack paths.
  5. Specify the minimal repair invariant. State what must happen to the old session id, which values
     must survive rotation, and which browser should remain authenticated in the replay check.
  6. Give a focused regression-test outline covering two browsers, pre-auth state preservation, old-id
     invalidation, and successful login. Do not propose weakening MFA or logging session identifiers.

  The artifacts declare the complete login and session lifecycle. Exactly one vulnerability is
  reachable; the remaining findings are intentional benign look-alikes.
artifacts:
  - id: session-middleware
    type: code
    label: src/http/session.ts — complete session creation and lookup path
    content: |
      // This is the complete session middleware. `sid` is an opaque 192-bit random identifier.
      export async function session(req, res, next) {
        let sid = req.cookies.sid;
        let record = sid ? await sessions.get(sid) : undefined;
        if (!record) {
          sid = base64url(crypto.randomBytes(24));
          record = { userId: null, oauthState: null, returnTo: '/tickets' };
          await sessions.set(sid, record, { ttlSeconds: 1800 });
        }
        req.sessionId = sid;
        req.session = record;
        res.cookie('sid', sid, {
          httpOnly: true, secure: true, sameSite: 'lax', path: '/', maxAge: 1_800_000,
        });
        next();
      }

      // sessions.get(request cookie) above is the only authenticated-session lookup. There is no
      // device binding, secondary token, or IP binding. The store is shared by all portal replicas.
  - id: login-routes
    type: code
    label: src/http/login.ts — complete password, MFA, OAuth-state, and redirect flow
    content: |
      router.get('/login', async (req, res) => {
        req.session.oauthState = base64url(crypto.randomBytes(24));
        req.session.returnTo = safeReturnTo(req.query.returnTo);
        await sessions.set(req.sessionId, req.session, { ttlSeconds: 1800 });
        res.render('login', { oauthState: req.session.oauthState });
      });

      router.post('/login', rateLimit('5/minute'), async (req, res) => {
        const body = LoginBody.parse(req.body); // email, password, six-digit totp, oauthState
        if (!timingSafeEqualText(body.oauthState, req.session.oauthState)) return res.sendStatus(403);
        const user = await users.findByEmail(body.email);
        if (!user || !(await argon2.verify(user.passwordHash, body.password))) return res.sendStatus(401);
        if (!(await totp.verify(user.totpSecret, body.totp))) return res.sendStatus(401);

        // Successful login upgrades THE EXISTING pre-auth record in place.
        req.session.userId = user.id;
        req.session.oauthState = null;
        await sessions.set(req.sessionId, req.session, { ttlSeconds: 28_800 });
        return res.redirect(req.session.returnTo);
      });

      function safeReturnTo(raw) {
        return typeof raw === 'string' && /^\/[a-z0-9/_-]*$/i.test(raw) && !raw.startsWith('//')
          ? raw : '/tickets';
      }
      // These are the complete login routes. No session-id rotation or old-record deletion occurs.
  - id: session-bootstrap
    type: code
    label: src/http/bootstrap.ts — intended cross-browser support-link behavior
    content: |
      router.get('/support-link/:sid', async (req, res) => {
        // Links are generated only for an unauthenticated troubleshooting session. The route lets a
        // support engineer and customer inspect the same pre-login diagnostics in separate browsers.
        const candidate = await sessions.get(req.params.sid);
        if (!candidate || candidate.userId !== null) return res.sendStatus(404);
        res.cookie('sid', req.params.sid, {
          httpOnly: true, secure: true, sameSite: 'lax', path: '/', maxAge: 1_800_000,
        });
        res.redirect('/diagnostics');
      });
      // Product requirement S-14 intentionally permits sharing ONLY an unauthenticated diagnostic
      // session. It never intends a shared authenticated session.
  - id: two-browser-trace
    type: log
    label: deterministic replay with browsers A and B
    content: |
      10:00:00 browser A GET /login, no cookie
      10:00:00 server creates sid=S-7, userId=null, oauthState=O-9; A receives sid=S-7
      10:00:05 A copies generated troubleshooting URL /support-link/S-7
      10:00:10 browser B GET /support-link/S-7; store says userId=null; B receives sid=S-7 and
               follows the redirect to /diagnostics (which does not mutate the session)
      10:00:20 browser A POST /login {valid password, valid TOTP, oauthState=O-9}
      10:00:20 sessions.set(S-7, {userId: U-42, oauthState:null, returnTo:'/tickets'})
      10:00:21 A GET /tickets with sid=S-7 -> sessions.get(S-7).userId=U-42 -> 200
      10:00:22 B GET /tickets with sid=S-7 -> sessions.get(S-7).userId=U-42 -> 200
      # B never submitted or observed the password, TOTP, or O-9. The trace is a controlled test;
      # production support-link URLs can be known by another browser before the customer logs in.
  - id: controls-spec
    type: spec
    label: exhaustive security-control facts for this review
    content: |
      - The login form is same-origin. SameSite=Lax blocks cross-site POST cookies, and oauthState must
        match the random value stored in the session. No state mismatch was accepted in testing.
      - Passwords use Argon2id with memory=64 MiB, iterations=3, parallelism=1. This meets policy P-8.
      - The sid cookie is Secure, HttpOnly, SameSite=Lax, path=/; TLS is enforced with HSTS.
      - safeReturnTo accepts only a single-slash local path. Tests reject `//host`, schemes, backslashes,
        and encoded slash variants before redirect. No other redirect helper exists.
      - Session ids have 192 random bits and were not guessed. Secrecy before login does not substitute
        for rotating privilege-boundary identifiers when intentional pre-auth sharing exists.
  - id: scanner-report
    type: table
    label: scanner and reviewer candidate findings
    content: |
      id  claim
      F1  POST /login has no synchronizer-CSRF middleware annotation.
      F2  Password verification is weak because the code does not call bcrypt.
      F3  The sid cookie lacks the attributes needed for a session cookie.
      F4  returnTo is an open redirect controlled by the query string.
      F5  A pre-auth sid is not rotated after password+MFA authentication, so a browser that already
          knows that sid observes the record after it is upgraded to userId=U-42.
tags: [security, vuln-discovery, session-fixation, authentication, nodejs]
