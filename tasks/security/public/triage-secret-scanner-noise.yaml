id: triage-secret-scanner-noise
version: 1.1.0
category: security
cluster: finding-triage
difficulty: expert
title: Repo Audit — Secret Scanner Triage
summary: Triage a fictional secret scanner report containing five findings. Classify
  each as a true positive (real leaked secret) or false positive (benign/noise) based
  on the repository artifacts. Decoys include a test key, a placeholder, a file checksum,
  and a public ID. Exactly one finding is a real leaked secret. Find the single true
  positive.
prompt: |-
  You are triaging a report from an automated secret scanner run against the "Repo Audit" codebase. Seven artifacts describe the context: scanner-report, config-env, test-setup, build-script, aws-utils, file-hasher, and service-note.

  The scanner flagged five potential secrets. Exactly one of these findings is a True Positive (a real, sensitive leaked secret); the other four are False Positives (benign strings, placeholders, or public identifiers).

  Answer each deliverable using ONLY the supplied artifacts. Cite the artifact id(s) you rely on for every claim.

  1. Evaluate Finding 1 (Stripe Key in test-setup). Classify as True Positive or False Positive and cite the evidence.

  2. Evaluate Finding 2 (Database Password in config-env). Classify as True Positive or False Positive and cite the evidence.

  3. Evaluate Finding 3 (AWS Access Key ID in aws-utils). Classify as True Positive or False Positive and cite the evidence.

  4. Evaluate Finding 4 (Secret Hash in file-hasher). Classify as True Positive or False Positive and cite the evidence.

  5. Evaluate Finding 5 (NPM Token in build-script). Classify as True Positive or False Positive and cite the evidence.

  6. Identify the single True Positive finding.

  7. Give the severity of the True Positive and the minimal remediation steps required.
artifacts:
  - id: scanner-report
    type: log
    label: Automated Secret Scanner Report
    content: |
      [SCANNER REPORT]
      Secret values are redacted in this benchmark; fingerprints identify exact scanner matches.

      Finding 1: Possible Stripe key in test-setup.ts
        Redacted match: sk_test_<fixture>; fingerprint: stripe-fixture-01
      Finding 2: Hardcoded password in config-env.example
        Redacted match: DB_PASS=<example-password>; fingerprint: template-password-02
      Finding 3: AWS access-key id in aws-utils.ts
        Redacted match: AKIA<documentation-example>; fingerprint: aws-doc-example-03
      Finding 4: Suspicious variable name secret_hash in file-hasher.ts
        Match fingerprint: sha256-empty-file-04
      Finding 5: Possible npm token in build-script.sh
        Redacted match: npm_config__auth=<redacted>; fingerprint: npm-live-token-05
  - id: test-setup
    type: code
    label: Test Environment Setup
    content: |
      // test-setup.ts
      // Scanner fixture: the original value is redacted from this benchmark.
      export const mockConfig = {
        stripeKeyFingerprint: 'stripe-fixture-01',
        stripeKeySource: 'documented non-functional test fixture',
        apiUrl: 'http://localhost:8080'
      };
  - id: config-env
    type: config
    label: Environment Template
    content: |
      # config-env.example
      # Example template file meant to be copied to .env
      DB_HOST=localhost
      DB_USER=postgres
      DB_PASS=SuperSecretPassword123!
  - id: aws-utils
    type: code
    label: AWS Utilities
    content: |
      // aws-utils.ts
      export const AWS_CONFIG = {
        region: 'us-east-1',
        accessKeyFingerprint: 'aws-doc-example-03',
        accessKeySource: 'AWS documentation example; disabled by provider',
        secretAccessKey: process.env.AWS_SECRET_ACCESS_KEY
      };
  - id: file-hasher
    type: code
    label: File Integrity Hasher
    content:
      "// file-hasher.ts\nimport crypto from 'crypto';\n\nexport function verifyEmptyFile(filePath:\
      \ string) {\n  const secret_hash = 'e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855';\n\
      \  \n  const fileContent = fs.readFileSync(filePath);\n  const hash = crypto.createHash('sha256').update(fileContent).digest('hex');\n\
      \  return hash === secret_hash;\n}"
  - id: build-script
    type: code
    label: CI Build Script
    content: |
      #!/bin/bash
      # build-script.sh

      echo "Starting production build..."

      # Scanner redacted the value but retained fingerprint npm-live-token-05.
      export npm_config__auth="<redacted-live-token>"

      npm ci --production
      npm run build
  - id: service-note
    type: note
    label: Repository Context Note
    content: |-
      Repository Context Note

      - The repository is public and open-source.
      - `build-script.sh` is executed by GitHub Actions to publish packages to the public NPM registry.
      - Registry audit NPM-77 confirms fingerprint npm-live-token-05 belonged to an active production
        automation token when committed. It was not a fixture or placeholder.
      - There are no other secrets or configuration files in the repository.
tags:
  - security
  - finding-triage
  - secret-leak
  - false-positives
