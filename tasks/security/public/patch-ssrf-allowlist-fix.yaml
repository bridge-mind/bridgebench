- id: patch-c
  type: diff
  label: Candidate Patch C
  content: "--- webhook-dispatcher.ts\n+++ webhook-dispatcher.ts\n@@ -3,6 +3,12 @@\n\
    \ export async function dispatchWebhook(req, res) {\n   const { targetUrl, payload\
    \ } = req.body;\n   \n+  // Strictly parse the URL and check the hostname\n+ \
    \ const parsed = new URL(targetUrl);\n+  if (parsed.hostname !== 'api.partner.example.com')\
    \ {\n+    return res.status(400).send('Invalid domain');\n+  }\n+\n   try {\n\
    \     const response = await safeFetch(targetUrl, { \n       method: 'POST', \n\
    \       body: JSON.stringify(payload),\n-      followRedirects: true \n+     \
    \ followRedirects: false \n     });"
- id: patch-d
  type: diff
  label: Candidate Patch D (Network Timeout)
  content: "--- webhook-dispatcher.ts\n+++ webhook-dispatcher.ts\n@@ -8,7 +8,8 @@\n\
    \     const response = await safeFetch(targetUrl, { \n       method: 'POST', \n\
    \       body: JSON.stringify(payload),\n-      followRedirects: true \n+     \
    \ followRedirects: true,\n+      timeout: 2000\n     });"
- id: service-note
  type: note
  label: Webhook Architecture Note
  content: |-
    Webhook Architecture Note

    - The `nativeFetch` implementation handles redirects transparently when `followRedirects: true` is set. It does not invoke any caller-provided callbacks during redirect hops.
    - The requirement is that data must ONLY be sent to `api.partner.example.com`. Sending data to any other internal or external host is a violation.
