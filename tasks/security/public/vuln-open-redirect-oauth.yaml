id: vuln-open-redirect-oauth
version: 1.1.0
category: security
cluster: vuln-discovery
difficulty: expert
title: AuthFlow OAuth Callback — Open Redirect Review
summary: 'Review a fictional "AuthFlow" authentication module. One real, reachable
  open redirect hides among benign look-alikes: a strict local-path redirect, a static
  logout redirect, a CORS preflight policy, and a safely normalized URL parser. Find
  the single reachable open redirect.'
prompt: |-
  You are performing a defensive security review of "AuthFlow", an internal authentication service. Seven artifacts describe it: oauth-callback, login-handler, logout-handler, cors-config, url-utils, routes-config, and service-note.

  Every redirect in the service is supposed to be safe. Exactly one of the behaviors in these artifacts is a real, reachable open redirect vulnerability; the others are look-alikes that are neutralized somewhere in the same artifacts.

  Answer each deliverable using ONLY the supplied artifacts. Cite the artifact id(s) you rely on for every claim. If something is not defined, not a sink, or not reachable in the artifacts, say so explicitly. Reason about reachability ONLY — do NOT write an exploit payload.

  1. Name the single real vulnerability class present in the module, using standard terminology, and point to the exact code behavior that constitutes it (name the artifact and the specific line/behavior).

  2. State the precondition / exploitability chain: the specific facts across the artifacts that together make it reachable by an external caller.

  3. A reviewer flags the `next` parameter in login-handler as an open redirect. Rule it in or out and cite the mechanism that decides it.

  4. A reviewer flags the logout-handler redirect as an open redirect. Rule it in or out and cite the evidence.

  5. A reviewer flags the cors-config as overly permissive, allowing arbitrary origins to redirect users. Rule it in or out and cite the mechanism that decides it.

  6. A reviewer flags the `normalizeUrl` function in url-utils as vulnerable to backslash bypasses (e.g., `\\attacker.com`). Rule it in or out for the routes that use it, citing the evidence.

  7. Give the severity of the one real vulnerability and the minimal control that closes it.
artifacts:
- id: oauth-callback
  type: code
  label: AuthFlow OAuth Callback Handler
  content: "// authflow/oauth-callback.ts\nimport { verifyOAuthState, exchangeCodeForToken\
    \ } from './oauth-client';\n\nexport async function oauthCallback(req, res) {\n\
    \  const { code, state } = req.query;\n  // State contains the original redirect_uri\
    \ encoded during the OAuth flow initiation\n  const decodedState = verifyOAuthState(state);\n\
    \  if (!decodedState) return res.status(400).send('Invalid state');\n  \n  const\
    \ token = await exchangeCodeForToken(code);\n  req.session.token = token;\n  \n\
    \  // The redirect_uri is extracted from the state.\n  const targetUrl\
    \ = decodedState.redirect_uri || '/dashboard';\n  \n  return res.redirect(302,\
    \ targetUrl);\n}"
- id: login-handler
  type: code
  label: AuthFlow Login Handler
  content: "// authflow/login-handler.ts\nimport { generateOAuthState } from './oauth-client';\n\
    import { isLocalPath } from './url-utils';\n\nexport async function initiateLogin(req,\
    \ res) {\n  const { redirect_uri } = req.query;\n  \n  // The redirect_uri is\
    \ embedded into the state WITHOUT validation here.\n  // It is assumed it will\
    \ be validated later, or that it's safe.\n  const state = generateOAuthState({\
    \ redirect_uri });\n  \n  const oauthUrl = `https://provider.example.com/oauth/authorize?client_id=CLIENT_ID&response_type=code&state=${state}&redirect_uri=https://auth.example.com/callback`;\n\
    \  return res.redirect(302, oauthUrl);\n}\n\nexport async function localLogin(req,\
    \ res) {\n  const { username, password, next } = req.body;\n  if (authenticate(username,\
    \ password)) {\n    const\
    \ target = isLocalPath(next) ? next : '/dashboard';\n    return res.redirect(302,\
    \ target);\n  }\n  return res.status(401).send('Unauthorized');\n}"
- id: logout-handler
  type: code
  label: AuthFlow Logout Handler
  content: |-
    // authflow/logout-handler.ts
    export async function logout(req, res) {
      req.session.destroy();
      return res.redirect(302, '/login?logged_out=true');
    }
- id: cors-config
  type: config
  label: AuthFlow CORS Configuration
  content: |-
    // authflow/cors-config.ts
    export const corsOptions = {
      origin: '*',
      methods: ['GET', 'POST', 'OPTIONS'],
      allowedHeaders: ['Content-Type', 'Authorization']
    };
- id: url-utils
  type: code
  label: AuthFlow URL Utilities
  content: |-
    // authflow/url-utils.ts
    export function isLocalPath(url: string): boolean {
      if (!url) return false;
      // Checks that the value starts with a single slash and not two slashes,
      // rejecting protocol-relative URLs like //host or \\host
      return /^\/[^/\\]/.test(url);
    }
- id: routes-config
  type: config
  label: AuthFlow Routes
  content: |
    # authflow/routes-config.yaml
    routes:
      - GET /auth/login        -> login-handler.initiateLogin
      - POST /auth/local       -> login-handler.localLogin
      - GET /callback          -> oauth-callback.oauthCallback
      - POST /auth/logout      -> logout-handler.logout
- id: service-note
  type: note
  label: AuthFlow Architecture Note
  content: "AuthFlow Architecture Note\n\n- The OAuth flow uses the `state` parameter\
    \ to pass context across the redirect boundary. \n- `generateOAuthState` cryptographically\
    \ signs the payload so it cannot be tampered with in transit.\n- `verifyOAuthState`\
    \ verifies the signature and returns the parsed payload.\n- There are no other\
    \ redirect handlers in the application."
tags:
- security
- vuln-discovery
- open-redirect
- oauth
- reachability
