id: vuln-command-exec-review
version: 1.1.0
category: security
cluster: vuln-discovery
difficulty: expert
title: Reelforge Thumbnail Worker Command-Execution Review
summary: >-
  Review a fictional video-thumbnail worker that shells out to an external
  frame-grabber. The worker builds render invocations from tenant-submitted job
  fields (preset, scale, overlay label, source URL) using two spawn helpers and
  server-generated temp paths. Exactly one behavior is a real, reachable
  vulnerability; the others are look-alikes neutralized elsewhere in the artifacts.
prompt: |
  You are performing a defensive security review of "Reelforge", a fictional
  thumbnail-generation worker. It reads a tenant-submitted thumbnail job and
  invokes an external frame-grabber binary ("framegrab") to render an image.
  Six artifacts describe the code path: thumbnail-worker, exec-util, job-intake,
  transcode-config, command-map, and service-note.

  Exactly one of the behaviors in these artifacts is a real, reachable
  vulnerability; the others are look-alikes that are neutralized somewhere in the
  same artifacts. Answer each deliverable using ONLY the supplied artifacts. Cite
  the artifact id(s) you rely on for every claim. If something is not defined or
  not reachable in the artifacts, say so explicitly. Reason about the sink and its
  reachability ONLY — do NOT write an injection string, a shell payload, or any
  working exploit.

  1. Name the single real vulnerability class present in thumbnail-worker, using
     standard terminology, and quote the exact expression that constitutes the
     sink.

  2. State the precondition / exploitability chain: the specific facts across the
     artifacts that make it reachable by a tenant, what capability (not payload) an
     attacker needs, and which of the two spawn helpers in exec-util is what makes
     the sink dangerous. If any required precondition is NOT satisfied, say so.

  3. A reviewer flags the PRIMARY framegrab render call (the one that passes the
     input path) as command injection. Is it? Rule it in or out and cite the
     mechanism that decides it.

  4. A reviewer flags the `preset` field as a command-injection vector. Is it? Rule
     it in or out and cite the evidence.

  5. A reviewer flags the `scale` (width x height) field, which is concatenated into
     the SAME filter string as the real sink, as a second injection. Is it? Rule it
     in or out and cite the mechanism that separates it from the real sink.

  6. Give the severity of the one real vulnerability and the minimal control that
     closes it. State the control precisely in terms of how the offending value
     must reach the frame-grabber instead.
artifacts:
  - id: thumbnail-worker
    type: code
    label: Reelforge thumbnail render worker
    content: |
      // thumbnail-worker.ts — renders one thumbnail for a queued job.
      import { runShell, runArgs } from './exec-util';
      import { presetFor } from './transcode-config';
      import { makeJobDir } from './tmp';   // mkdtemp-backed; see service-note

      export async function renderThumbnail(job: ThumbnailJob): Promise<string> {
        // inputPath and outPath are SERVER-generated temp paths inside a per-job
        // mkdtemp directory (makeJobDir). They are not tenant strings.
        const dir = await makeJobDir();                 // 0700, random suffix
        const inputPath = `${dir}/source.mp4`;          // written by the fetch step
        const outPath = `${dir}/thumb.png`;

        const preset = presetFor(job.presetKey);        // fixed map lookup (transcode-config)

        // PRIMARY RENDER: argv array, no shell. framegrab receives each element as a
        // separate argument; nothing here is parsed by a shell.
        await runArgs('framegrab', [
          '-i', inputPath,
          '-preset', preset,
          '-frames', '1',
          outPath,
        ]);

        // OPTIONAL OVERLAY PASS: if the job asks for a watermark, run a second pass
        // that burns text over the frame using framegrab's drawtext filter. This
        // pass builds a SHELL command string and runs it via runShell.
        if (job.overlayLabel) {
          // job.scale is "WxH"; job.overlayLabel is the tenant's caption text.
          const vf =
            `drawtext=text='${job.overlayLabel}':x=10:y=10,` +   // <-- overlayLabel spliced in
            `scale=${job.scale}`;                                //     scale spliced in too
          await runShell(`framegrab -i "${outPath}" -vf "${vf}" "${outPath}"`);
        }

        return outPath;
      }
  - id: exec-util
    type: code
    label: Reelforge process-spawn helpers (the only two spawn primitives)
    content: |
      // exec-util.ts — the ONLY two process-spawn primitives in the service.
      import { execFile, exec } from 'node:child_process';
      import { promisify } from 'node:util';

      const pExecFile = promisify(execFile);
      const pExec = promisify(exec);

      // runArgs: spawns `bin` with an ARGV ARRAY. No shell is interpolated; each
      // element of `args` is delivered to the process as one literal argument, so
      // shell metacharacters in an argument have no shell meaning. (execFile does
      // not spawn `/bin/sh`.)
      export async function runArgs(bin: string, args: string[]): Promise<string> {
        const { stdout } = await pExecFile(bin, args);
        return stdout;
      }

      // runShell: runs a single COMMAND STRING through `/bin/sh -c`. The string is
      // parsed by the shell, so any shell metacharacter in the string is interpreted
      // by the shell. Anything concatenated into this string is in shell context.
      export async function runShell(command: string): Promise<string> {
        const { stdout } = await pExec(command);   // exec() = /bin/sh -c "<command>"
        return stdout;
      }
  - id: job-intake
    type: code
    label: Reelforge job intake (populates job fields from tenant input)
    content: |
      // job-intake.ts — builds a ThumbnailJob from the tenant request and enqueues it.
      // POST /thumbnails is tenant-facing. This is the ONLY place job fields are set
      // from request input; the worker reads them unchanged.

      export function buildJob(req): ThumbnailJob {
        const width = parseInt(String(req.body.width ?? '320'), 10);
        const height = parseInt(String(req.body.height ?? '180'), 10);
        // Reject non-integers: scale never carries anything but two integers.
        if (!Number.isInteger(width) || !Number.isInteger(height) ||
            width <= 0 || height <= 0 || width > 4096 || height > 4096) {
          throw new BadRequest('width/height must be positive integers');
        }

        return {
          sourceUrl: String(req.body.sourceUrl ?? ''),   // fetched to a temp file, not spawned
          presetKey: String(req.body.preset ?? 'web'),   // mapped in transcode-config
          scale: `${width}:${height}`,                   // ONLY integers, colon-joined
          overlayLabel: req.body.overlayLabel            // FREE TEXT — passed through as-is
            ? String(req.body.overlayLabel)
            : undefined,
        };
      }
      // Note: overlayLabel is the only free-text field that reaches the worker. It is
      // NOT validated, escaped, or constrained here or anywhere downstream.
  - id: transcode-config
    type: config
    label: Reelforge transcode presets (production)
    content: |
      # transcode-config.ts — preset resolution. COMPLETE: these are all presets.
      #
      # presetFor(key) maps a tenant-supplied preset KEY to a fixed, server-defined
      # preset NAME. An unknown key falls back to 'web'. The value that reaches the
      # framegrab argv is therefore ALWAYS one of the four fixed strings below — a
      # tenant string is never passed through as the preset.

      export const PRESET_MAP: Record<string, string> = {
        web: 'web', hd: 'hd', thumb: 'thumb', social: 'social',
      };

      export function presetFor(key: string): string {
        return PRESET_MAP[key] ?? 'web';   // unknown -> 'web'; never the raw input
      }
  - id: command-map
    type: table
    label: Reelforge spawn map (COMPLETE — every place a job field reaches a process spawn)
    content: |
      Reelforge process-spawn map — COMPLETE. Every call to a spawn helper in the
      service is listed, with the helper used, whether a shell parses the resulting
      command, and which job-derived values reach it. A spawn not in this table does
      not exist in the service.

      call site                         | helper   | shell parses? | job-derived values in it
      ----------------------------------|----------|---------------|------------------------------------------
      primary render (framegrab -i ...) | runArgs  | NO            | inputPath, outPath (server temp paths),
                                        |          |               | preset (fixed map value)
      overlay pass (framegrab -vf ...)  | runShell | YES           | overlayLabel (free text), scale ("W:H")
      (no other spawn)                  | —        | —             | —

      Notes:
        - The primary render is the ONLY use of runArgs; the overlay pass is the ONLY
          use of runShell. There are no other spawns anywhere.
        - inputPath/outPath are generated by makeJobDir (mkdtemp), not from tenant text.
        - `scale` is built by job-intake from two parsed integers; `overlayLabel` is
          free text passed through unchanged.
  - id: service-note
    type: note
    label: Reelforge worker service notes (authoritative, as-deployed)
    content: |
      Reelforge worker notes — authoritative; reflects production as deployed.

      - Spawn surface: the service spawns processes in EXACTLY two places, both in
        thumbnail-worker, using the two helpers in exec-util. runArgs takes an argv
        array (no shell); runShell runs a `/bin/sh -c` string (shell parses it).
        command-map is the complete inventory.

      - Temp files: makeJobDir() uses mkdtemp to create a per-job directory with a
        RANDOM suffix and 0700 permissions; source.mp4 and thumb.png live only inside
        it. The paths are unpredictable and not attacker-influenced, so there is no
        insecure-temp-file / symlink-race issue here — do not raise one.

      - sourceUrl is fetched to source.mp4 by the fetch step and is never passed to a
        spawn helper; it is not part of any command string.

      - Tenant-controlled job fields are exactly: preset (mapped to a fixed value),
        width/height (validated integers, joined as scale), overlayLabel (free text),
        and sourceUrl (fetched, not spawned). This note, the code files, transcode-config,
        and command-map are the COMPLETE render path. There is no other spawn, no other
        command builder, and no other place a job field reaches a process.
tags: [security, vuln-discovery, command-injection, shell, reachability]
