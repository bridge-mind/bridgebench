id: s1-clockwork-orrery
season: 1
title: Clockwork Orrery
category: interactive
requiresWebGL: true
viewport: { width: 1280, height: 800 }
libraries:
  three: "0.182.0"
controls:
  - id: time-scale
    kind: slider
    label: Time Scale
    behavior: "Scales orbital speed from frozen (0) to fast-forward (maximum). Planet positions must respond immediately and continuously."
  - id: scene-canvas
    kind: canvas
    label: Orrery
    behavior: "Clicking a planet smoothly focuses the camera on it and follows its orbit; clicking empty space returns to the full view. Set data-bb-control=\"scene-canvas\" on the rendering canvas element."
screenshots:
  - { at: 0, name: hero }
  - { at: 2500, name: motion }
prompt: |
  A brass clockwork orrery of an invented solar system — a Victorian
  scientific instrument brought to life.

  Model a central sun of polished gold, orbited by 5–7 invented planets on
  concentric brass rails: vary their sizes, materials (burnished copper,
  jade, lapis, smoked glass), and orbital speeds. At least one planet has a
  ring system and at least one has a small moon on its own sub-orbit. Planets
  sit on thin support arms connected to visible clockwork below — gears that
  plausibly turn as the mechanism runs (they don't need true gear-ratio
  physics, but they must rotate in sympathy with the orbits).

  Metallic PBR materials with a warm key light and cool rim light will sell
  the brass. Orbit rails are thin glowing inlays. The backdrop is a dark
  velvet observatory with a hint of star chart.

  Clicking a planet focuses and follows it; clicking empty space returns to
  the full view of the machine. Build the required time-scale slider as a
  minimal overlay control. Make it feel precision-machined.
