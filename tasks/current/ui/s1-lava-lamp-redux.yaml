id: s1-lava-lamp-redux
season: 1
title: Lava Lamp Redux
category: simulation
requiresWebGL: true
viewport: { width: 1280, height: 800 }
libraries:
  three: "0.182.0"
controls:
  - id: heat-slider
    kind: slider
    label: Heat
    behavior: "Controls blob buoyancy and churn speed: at 0 the lava is nearly still, at maximum it churns vigorously. The visual difference must be obvious within two seconds."
  - id: color-cycle
    kind: button
    label: Shift Palette
    behavior: "Each press cycles the lava through at least 3 clearly distinct color palettes (e.g. magma orange, toxic green, deep violet)."
screenshots:
  - { at: 0, name: hero }
  - { at: 2500, name: motion }
systemPrompt: |
  This is BridgeBench's signature hero artifact. It must read immediately as a
  physical lava lamp, not an abstract particle field, generic shader demo, or
  dashboard. Compose it like a premium product shot: one centered glass vessel,
  a clearly modeled metal base and cap, and luminous wax volumes with a strong
  silhouette against a dark room.

  Favor a complete, reliable scene over fragile technical spectacle. Keep the
  required controls compact and visually subordinate to the lamp. Do not add
  explanatory copy, loading screens, decorative panels, or unrelated interface
  chrome. Use stable, performant geometry and cap renderer pixel ratio so the
  animation remains fluid. Every animated and interactive behavior must honor
  the deterministic reset contract.
prompt: |
  Recreate a classic lava lamp as a polished real-time three.js scene.

  Stage a tall, recognizable lamp in a dark room. The glass chamber should feel
  transparent and dimensional, while the metal base and cap catch warm colored
  reflections. The lava is the primary light source: make it saturated and
  emissive, with restrained bloom or a comparably reliable glow treatment that
  preserves detail in the wax and glass.

  Inside the chamber, several molten volumes rise, stretch, merge, separate,
  cool, and sink in a continuous convection cycle. MarchingCubes metaballs are
  encouraged, but any smooth implicit-surface approach is valid. Motion must be
  viscous and uninterrupted—never frozen, teleporting, or popping between
  states. A very slow camera drift or pointer parallax may add depth, but the
  full lamp must remain composed inside the viewport at all times.

  The Heat slider must visibly change both buoyancy and churn speed within two
  seconds: near zero should feel almost suspended, while maximum heat should be
  unmistakably vigorous. Shift Palette must cycle through at least three
  distinct, cohesive lava-and-light palettes. Reflect both control values in
  getState(), and keep the two controls together in a minimal corner overlay.

  Aim for a fluid result on a typical laptop: prefer a moderate metaball field,
  reuse materials and geometry, and cap renderer pixel ratio. Make the opening
  frame presentation-ready and the later motion frame visibly evolved.
