id: s1-lava-lamp-redux
season: 1
title: Lava Lamp Redux
category: simulation
requiresWebGL: true
viewport: { width: 1280, height: 800 }
libraries:
  three: "0.182.0"
controls:
  - id: heat-slider
    kind: slider
    label: Heat
    behavior: "Controls blob buoyancy and churn speed: at 0 the lava is nearly still, at maximum it churns vigorously. The visual difference must be obvious within two seconds."
  - id: color-cycle
    kind: button
    label: Shift Palette
    behavior: "Each press cycles the lava through at least 3 clearly distinct color palettes (e.g. magma orange, toxic green, deep violet)."
screenshots:
  - { at: 0, name: hero }
  - { at: 2500, name: motion }
prompt: |
  Recreate the classic lava lamp as a real-time 3D scene with three.js — this
  is BridgeBench's signature task, so make it iconic.

  A tall glass lamp sits in a dark room and is the room's primary light
  source. Inside, molten blobs rise, merge, split, and sink with slow organic
  motion — use metaballs (three/addons/objects/MarchingCubes.js works well) or
  your own implicit-surface approximation. The glass body should transmit and
  refract the glow convincingly; the metal base and cap should catch warm
  reflections. Add bloom so the lava reads as emissive, and let the lamp cast
  soft ambient light onto the surrounding darkness.

  The blobs must never freeze or pop discontinuously; motion is continuous,
  viscous, and hypnotic. Keep an ambient slow camera drift or gentle parallax
  so the scene feels alive even before any interaction.

  Build the two required controls as a minimal overlay UI in one corner. Make
  it hypnotic and visually stunning.
