id: s1-synthwave-horizon
season: 1
title: Synthwave Horizon
category: simulation
requiresWebGL: true
viewport: { width: 1280, height: 800 }
libraries:
  three: "0.182.0"
controls:
  - id: speed-slider
    kind: slider
    label: Speed
    behavior: "Controls forward travel speed over the grid, from a slow cruise at 0 to a blistering rush at maximum. The apparent motion change must be obvious within two seconds."
screenshots:
  - { at: 0, name: hero }
  - { at: 2500, name: motion }
prompt: |
  An infinite 1986 synthwave drive into the sunset.

  The camera glides forward forever over a neon wireframe grid terrain that
  scrolls beneath it seamlessly — no visible looping seam. Gentle procedural
  hills rise on both sides of a flat central corridor. Ahead, a huge retro
  sun sits on the horizon: banded with horizontal scanline gaps, glowing hot
  pink to orange, with a soft halo. The sky above fades through purple dusk
  gradients into a sparse starfield.

  Grid lines should glow (bloom via
  three/addons/postprocessing/UnrealBloomPass.js is a good fit) in cyan or
  magenta against a near-black ground. Add subtle fog so grid lines dissolve
  into the distance rather than popping. Optional flourishes that score well
  on visual quality: distant chrome mountains, occasional shooting stars, a
  slight CRT vignette.

  The horizon must remain steady — no camera bobbing. Build the required
  speed slider as a minimal overlay control. Make it radiate 80s heat.
