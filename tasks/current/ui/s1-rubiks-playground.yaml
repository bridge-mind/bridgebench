id: s1-rubiks-playground
season: 1
title: Rubik's Playground
category: game
requiresWebGL: true
viewport: { width: 1280, height: 800 }
libraries:
  three: "0.182.0"
controls:
  - id: scene-canvas
    kind: canvas
    label: Cube
    behavior: "Dragging on a cube face rotates that layer in 90° steps with a smooth animation; dragging on the background orbits the whole cube. Set data-bb-control=\"scene-canvas\" on the rendering canvas element."
  - id: scramble
    kind: button
    label: Scramble
    behavior: "Applies a quick animated sequence of ~15 random layer turns (seeded through reset(seed) so the same seed scrambles identically)."
  - id: solve
    kind: button
    label: Solve
    behavior: "Animates the cube back to the solved state (replaying the inverse move history is acceptable) and ends with all six faces uniform."
screenshots:
  - { at: 0, name: hero }
  - { at: 2500, name: motion }
prompt: |
  A pristine, tactile 3×3 Rubik's Cube you can actually play with.

  Build the cube from 26 rounded cubelets with colored sticker faces (the
  classic white/yellow/red/orange/blue/green scheme), tight seams, and soft
  studio lighting on a dark backdrop with a subtle contact shadow. The cube
  floats at a pleasing three-quarter angle with a slow, gentle idle drift
  (a few degrees of orbit sway) so the scene is alive even before the first
  touch — user interaction overrides the drift.

  Interaction is the whole task and must feel great:
  - Drag ON a face → the corresponding layer turns 90° in the drag
    direction, animated with a satisfying ease and slight overshoot. Turns
    queue cleanly if the user drags again mid-animation.
  - Drag on the BACKGROUND → orbit the whole cube.
  - The cube's logical state must stay consistent with its visuals — after
    any sequence of turns, stickers are exactly where a real cube would put
    them. getState() should expose the sticker state and a moveCount.

  Scramble and Solve buttons behave exactly as specified in the controls
  contract. A tiny move counter in the overlay is a nice touch.

  No gimmicks needed — nail the feel, the lighting, and the correctness.
