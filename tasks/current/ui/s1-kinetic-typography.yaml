id: s1-kinetic-typography
season: 1
title: Kinetic Typography
category: typography
requiresWebGL: true
viewport: { width: 1280, height: 800 }
libraries:
  three: "0.182.0"
controls:
  - id: scene-canvas
    kind: canvas
    label: Type field
    behavior: "Moving the pointer repels nearby particles (the word deforms around the cursor and heals when it leaves). Clicking toggles between EXPLODE (particles scatter outward in 3D) and REFORM (particles fly home and rebuild the word). Set data-bb-control=\"scene-canvas\" on the rendering canvas element."
screenshots:
  - { at: 0, name: hero }
  - { at: 2500, name: motion }
prompt: |
  The word "BRIDGE" built from tens of thousands of glowing particles in 3D
  space.

  Do NOT load a font file. Render the word to an offscreen 2D canvas with a
  bold system font, sample the filled pixels, and lift those sample points
  into 3D as particle home positions with slight depth jitter — this is the
  classic technique and it produces crisp, readable type.

  On load, particles swirl in from random positions and assemble the word
  over a couple of seconds. At rest the word "breathes": particles drift a
  few pixels around their home with individual phase, so the type shimmers
  without losing legibility. Color the particles with a smooth gradient
  along the word's length, glowing against a near-black background —
  additive blending sells it.

  Pointer proximity repels particles smoothly (an inverse-falloff force),
  and they spring back with slight overshoot when the pointer leaves. A
  click explodes the word outward in 3D with tumbling motion; the next click
  (or a beat of a few seconds) pulls every particle home along curved paths.

  Subtle camera parallax tied to pointer position adds depth. Make the type
  feel alive.
