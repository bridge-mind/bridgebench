id: s1-galaxy-forge
season: 1
title: Galaxy Forge
category: interactive
requiresWebGL: true
viewport: { width: 1280, height: 800 }
libraries:
  three: "0.182.0"
controls:
  - id: scene-canvas
    kind: canvas
    label: Orbit view
    behavior: "Dragging on the canvas orbits the camera around the galaxy; the mouse wheel zooms. Set data-bb-control=\"scene-canvas\" on the rendering canvas element."
  - id: regenerate
    kind: button
    label: Regenerate
    behavior: "Reseeds and rebuilds the galaxy with a visibly different spiral structure and color scheme (arm count, tightness, or hue must clearly change)."
screenshots:
  - { at: 0, name: hero }
  - { at: 2500, name: motion }
prompt: |
  Forge a spiral galaxy the viewer can hold in their hands.

  Generate a rotating spiral galaxy as a large particle system — target on
  the order of 100,000 THREE.Points, favoring density in the arms. Color the
  particles by role: a hot bright core, cooler blue-white arms, warm dust
  lanes between them, all fading with radius. The whole galaxy slowly rotates
  with differential speed (inner faster than outer). A faint background
  starfield gives parallax depth.

  Camera interaction is the heart of this task: dragging orbits, wheel zooms
  (three/addons/controls/OrbitControls.js is available). Frame the galaxy at
  a cinematic three-quarter tilt on load.

  Additive blending, subtle bloom, and size attenuation will make it glow.
  Keep particle motion silky — precompute what you can so the frame loop
  stays lean.

  Build the required Regenerate button as a minimal overlay control. Make it
  feel like holding a universe.
