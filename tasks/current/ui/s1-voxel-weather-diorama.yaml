id: s1-voxel-weather-diorama
season: 1
title: Voxel Weather Diorama
category: simulation
requiresWebGL: true
viewport: { width: 1280, height: 800 }
libraries:
  three: "0.182.0"
controls:
  - id: cycle-weather
    kind: button
    label: Cycle Weather
    behavior: "Each press advances to the next weather state in a fixed cycle (e.g. clear day → rain → thunderstorm → snow → clear night). The transition must be visually unmistakable within two seconds."
screenshots:
  - { at: 0, name: hero }
  - { at: 2500, name: motion }
prompt: |
  A floating voxel island diorama with living weather.

  Build a small island out of voxels (instanced cubes) floating in a void: a
  grass top layer, dirt and stone beneath tapering to a jagged underside, a
  pond, a couple of chunky voxel trees, maybe a tiny cabin with a warm
  window. The island slowly bobs and rotates a few degrees, like a display
  piece on an invisible turntable.

  Weather is the star. Implement at least four distinct states — clear day,
  rain, thunderstorm, and snow (a clear night with stars is a welcome
  fifth). Rain falls as fast streaks that stop at surfaces; the thunderstorm
  darkens the sky and fires occasional lightning flashes that illuminate the
  whole island for a frame or two, with drifting dark clouds overhead; snow
  falls as slow tumbling flakes that gradually whiten the grass tops while
  the state persists.

  Sky color, lighting temperature, and ambient particles must all change per
  state — a viewer should identify the weather instantly from a screenshot.
  Transitions animate smoothly rather than hard-cutting.

  Build the required cycle button as a minimal overlay control, and show the
  current state's name subtly. Make it charming — a tiny world you want to
  live in.
