id: s1-debug-stale-selector-cache
season: 1
cluster: state-mutation
difficulty: hard
title: Stale Selector Cache
summary: Derived selectors keep serving stale values after data is removed.
prompt: |
  Our metrics engine memoizes derived selectors over a versioned key-value
  store. Builders report that removing data doesn't refresh the derived
  panels — they keep showing the old aggregate until some unrelated write
  lands. A full clear shows the same behavior.

  Use the evidence and the code to find the actual root cause before
  patching. Fix the defect. Do not change the module's public API, and keep
  the memoization behavior intact — selectors must not recompute when their
  dependencies haven't changed.
entryModule: src/index.ts
entrySymbols:
  - resetEngine
  - set
  - del
  - clearAll
  - get
  - select
  - computeCount
visibleEvidence:
  userReport: |
    Removing a metric doesn't refresh the derived panels; they only update
    after the next write. Re-adding and removing again does the same thing,
    and "clear all" leaves every panel frozen on its old numbers.
  failingTestOutput: |
    ● selectors › recomputes after delete
      expect(select('sum')).toBe(1)
      Expected: 1
      Received: 3
  notes:
    - This started showing up after memoize.ts was refactored to string
      fingerprints — suspect the join('|') delimiter collides somewhere.
files:
  - path: src/store.ts
    contents: |
      export class VersionedStore {
        private data = new Map<string, number>();
        private versions = new Map<string, number>();

        set(key: string, value: number): void {
          this.data.set(key, value);
          this.versions.set(key, (this.versions.get(key) ?? 0) + 1);
        }

        get(key: string): number | undefined {
          return this.data.get(key);
        }

        has(key: string): boolean {
          return this.data.has(key);
        }

        delete(key: string): boolean {
          return this.data.delete(key);
        }

        clear(): void {
          this.data.clear();
        }

        versionOf(key: string): number {
          return this.versions.get(key) ?? 0;
        }
      }
  - path: src/memoize.ts
    contents: |
      import type { VersionedStore } from './store';

      export interface CacheEntry {
        fingerprint: string;
        value: number;
      }

      export function fingerprint(store: VersionedStore, deps: string[]): string {
        return deps.map((k) => `${k}:${store.versionOf(k)}`).join('|');
      }

      export class SelectorCache {
        private entries = new Map<string, CacheEntry>();

        read(name: string, fp: string): number | undefined {
          const entry = this.entries.get(name);
          return entry && entry.fingerprint === fp ? entry.value : undefined;
        }

        write(name: string, fp: string, value: number): void {
          this.entries.set(name, { fingerprint: fp, value });
        }

        invalidateAll(): void {
          this.entries.clear();
        }
      }
  - path: src/selectors.ts
    contents: |
      import type { VersionedStore } from './store';
      import { SelectorCache, fingerprint } from './memoize';

      export interface SelectorDef {
        deps: string[];
        compute: (values: number[]) => number;
      }

      export class SelectorEngine {
        private computeCounts = new Map<string, number>();

        constructor(
          private store: VersionedStore,
          private cache: SelectorCache,
          private defs: Map<string, SelectorDef>,
        ) {}

        select(name: string): number {
          const def = this.defs.get(name);
          if (!def) throw new Error(`unknown selector: ${name}`);
          const fp = fingerprint(this.store, def.deps);
          const cached = this.cache.read(name, fp);
          if (cached !== undefined) return cached;
          const values = def.deps.map((k) => this.store.get(k) ?? 0);
          const value = def.compute(values);
          this.computeCounts.set(name, (this.computeCounts.get(name) ?? 0) + 1);
          this.cache.write(name, fp, value);
          return value;
        }

        computeCount(name: string): number {
          return this.computeCounts.get(name) ?? 0;
        }
      }
  - path: src/index.ts
    contents: |
      import { VersionedStore } from './store';
      import { SelectorCache } from './memoize';
      import { SelectorEngine, type SelectorDef } from './selectors';

      const DEFS = new Map<string, SelectorDef>([
        ['sum', { deps: ['alpha', 'beta', 'gamma'], compute: (v) => v.reduce((a, b) => a + b, 0) }],
        ['spread', { deps: ['alpha', 'beta'], compute: ([a, b]) => Math.max(a, b) - Math.min(a, b) }],
        ['gammaSquared', { deps: ['gamma'], compute: ([g]) => g * g }],
      ]);

      let store = new VersionedStore();
      let engine = new SelectorEngine(store, new SelectorCache(), DEFS);

      export function resetEngine(): void {
        store = new VersionedStore();
        engine = new SelectorEngine(store, new SelectorCache(), DEFS);
      }

      export function set(key: string, value: number): void {
        store.set(key, value);
      }

      export function del(key: string): boolean {
        return store.delete(key);
      }

      export function clearAll(): void {
        store.clear();
      }

      export function get(key: string): number | null {
        return store.get(key) ?? null;
      }

      export function select(name: string): number {
        return engine.select(name);
      }

      export function computeCount(name: string): number {
        return engine.computeCount(name);
      }
publicReproTests:
  - description: derived sum refreshes after a dependency is deleted
    steps:
      - { symbol: resetEngine }
      - { symbol: set, args: [alpha, 1] }
      - { symbol: set, args: [beta, 2] }
      - { symbol: select, args: [sum], expect: 3 }
      - { symbol: del, args: [beta], expect: true }
      - { symbol: select, args: [sum], expect: 1 }
constraints:
  preserveExports: true
  forbidNewDependencies: true
  maxAstEditRatio: 0.35
responseContract:
  diagnosisRequired: true
  codeRequired: true
