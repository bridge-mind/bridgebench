id: root-cause-n-plus-one-orm
version: 1.1.0
category: debugging
cluster: root-cause-isolation
difficulty: expert
title: Order Summary Endpoint Exhausts Its Database Pool Despite Fast Indexed Product Lookups
summary: >-
  The order summary endpoint degrades as page size rises even though every individual product lookup
  uses an index and Redis is healthy. A missing index, a Redis outage, pool sizing, and database
  CPU all look plausible. Reconcile the complete request path, query trace, and fixes to isolate the
  defect and choose the fix that holds under load.
prompt: |
  Answer each deliverable using ONLY the supplied artifacts (endpoint-code, orm-query-log,
  request-trace, schema-and-plan, cache-status, pool-metrics, fixes). Cite the artifact id(s) for
  every claim. Use this vocabulary for verdicts: root-cause, red-herring, adequate-fix, shallow-fix.

  The admin order-summary endpoint returns a page of recent orders with each line item's current
  catalog details. It is fast for a five-order page but intermittently times out at the normal
  24-order page size. The database reports many fast indexed queries rather than one slow query.
  Trace the symptom to the query pattern that creates the load; do not stop at the pool-exhaustion
  symptom or the individual query latency.

  1. ROOT CAUSE. Name the single code-path defect and cite the exact artifact id and code locations.
     State the query-count invariant a 24-order response should satisfy and the count this path
     actually emits.
  2. AMPLIFICATION CHAIN. From orm-query-log and request-trace, trace one 24-order response from
     its one order query through the per-order line-item lookups and per-line product lookups. State
     the number of orders, line items, distinct SKUs, total SQL queries, and why repeated SKUs do
     not reduce the product-query count.
  3. RED HERRING: MISSING PRODUCT INDEX. Explain why an absent or slow index is not the root cause,
     citing schema-and-plan. State what the query plan and per-query latency prove, and why fast
     indexed queries can still exhaust the pool in aggregate.
  4. RED HERRING: REDIS OUTAGE. Explain why Redis is not causing the incident, citing cache-status
     and endpoint-code. State which catalog path uses Redis, which path the endpoint actually calls,
     and why improving a healthy cache cannot remove the ORM calls shown in the trace.
  5. RED HERRING: DATABASE CAPACITY OR POOL SIZING. Explain why pool exhaustion is a downstream
     symptom rather than the origin, citing pool-metrics and request-trace. State the observed
     difference between a five-order request and a 24-order request.
  6. ADEQUATE FIX. From fixes, name the one option that resolves the root cause without violating
     the tenant-specific pricing and p99 constraints. State the maximum number of SQL round trips
     it uses for a response, independent of the number of line items.
  7. SHALLOW OR HARMFUL FIXES. For each other option in fixes, explain why it is shallow or harmful,
     naming the specific regression or reason it leaves the cause intact.

  Exactly one resolution is defensible per deliverable; it is fully determined by the artifacts.
artifacts:
  - id: endpoint-code
    type: code
    label: order-api/order-summary.service.ts complete request path
    content: |
      // This is the COMPLETE request path for GET /admin/orders/summary. No GraphQL resolver,
      // interceptor, service mesh, or hidden repository method queries orders, order_items, or
      // catalog_products for this response. The controller invokes buildOrderSummaries exactly once.
      //
      // Price is tenant-specific: catalogProducts.findBySku(tenantId, sku) returns the current
      // price for that tenant's catalog.

      export async function buildOrderSummaries(tenantId: string, pageSize = 24) {
        const orders = await orderRepository.findRecentByTenant(tenantId, pageSize);

        return Promise.all(
          orders.map(async (order) => {
            const items = await orderItemRepository.findByOrderId(order.id);

            const lines = await Promise.all(
              items.map(async (item) => {
                const product = await catalogProducts.findBySku(tenantId, item.sku);
                // findBySku reads PostgreSQL directly; it does not call catalogCache.
                return {
                  sku: item.sku,
                  quantity: item.quantity,
                  title: product.title,
                  currentPriceCents: product.priceCents,
                };
              }),
            );

            return { id: order.id, number: order.orderNumber, lines };
          }),
        );
      }

      export const orderRepository = {
        findRecentByTenant(tenantId: string, limit: number) {
          return db.query(
            `SELECT id, order_number FROM orders
             WHERE tenant_id = $1 ORDER BY created_at DESC LIMIT $2`,
            [tenantId, limit],
          );
        },
      };

      export const orderItemRepository = {
        findByOrderId(orderId: string) {
          return db.query(
            `SELECT order_id, sku, quantity FROM order_items WHERE order_id = $1 ORDER BY position`,
            [orderId],
          );
        },
      };

      export const catalogProducts = {
        findBySku(tenantId: string, sku: string) {
          return db.query(
            `SELECT sku, title, price_cents AS "priceCents"
             FROM catalog_products WHERE tenant_id = $1 AND sku = $2`,
            [tenantId, sku],
          );
        },
      };

      // Invariant for this endpoint: query count must not grow with the number of returned orders
      // or line items.
  - id: orm-query-log
    type: log
