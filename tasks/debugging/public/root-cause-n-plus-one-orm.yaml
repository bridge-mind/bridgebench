      10:14:00.031  Q26  SELECT catalog_products WHERE tenant='tenant-north' AND sku='SKU-04' rows=1 0.7ms
      10:14:00.031  Q27  SELECT catalog_products WHERE tenant='tenant-north' AND sku='SKU-09' rows=1 0.8ms
      10:14:00.032  Q28  SELECT catalog_products WHERE tenant='tenant-north' AND sku='SKU-04' rows=1 0.7ms
      10:14:00.032  Q29  SELECT catalog_products WHERE tenant='tenant-north' AND sku='SKU-01' rows=1 0.8ms
