  - id: schema-and-plan
    type: spec
    label: database schema and representative catalog lookup plan
    content: |
      CREATE TABLE catalog_products (
        tenant_id UUID NOT NULL,
        sku TEXT NOT NULL,
        title TEXT NOT NULL,
        price_cents INTEGER NOT NULL,
        PRIMARY KEY (tenant_id, sku)
      );
      CREATE INDEX order_items_order_id_idx ON order_items(order_id);

      EXPLAIN (ANALYZE, BUFFERS)
      SELECT sku, title, price_cents FROM catalog_products
      WHERE tenant_id = 'tenant-north' AND sku = 'SKU-04';

      Index Scan using catalog_products_pkey on catalog_products
        Index Cond: ((tenant_id = 'tenant-north') AND (sku = 'SKU-04'))
        Planning Time: 0.09 ms
        Execution Time: 0.31 ms
        Shared Hit Blocks: 4

      # The complete relevant schema is shown above.
  - id: cache-status
    type: log
    label: catalog cache health and routing configuration during the incident
    content: |
      catalog-cache status at 10:14Z:
        redisPrimary=healthy  replicationLagMs=0  evictions=0  errorRate=0.00%
        catalog-page cacheHitRate=98.7%  p95GetMs=0.6ms

      catalog-page route:
        getCatalogProduct(tenantId, sku) -> catalogCache.getOrLoad(...)

      admin order-summary route:
        buildOrderSummaries(...) -> catalogProducts.findBySku(...)
        catalogProducts.findBySku(...) -> PostgreSQL directly
  - id: pool-metrics
    type: table
    label: order-api PostgreSQL pool and database host metrics
    content: |
      minute  summaryRps  avgQueriesPerSummary  poolActive  poolWaitingP95Ms  dbCpu  dbQueryP95Ms
      10:10   6           21                    18/40       1                21%    1.1
      10:12   14          97                    40/40       388              24%    1.0
      10:14   16          97                    40/40       466              26%    1.1
      10:16   3           21                    19/40       2                20%    1.0
  - id: fixes
    type: note
    label: candidate fixes for the order summary query shape
    content: |
      F1: Replace the nested lazy lookups with three tenant-scoped bulk queries:
          (a) fetch the page of orders; (b) fetch all order_items WHERE order_id = ANY($1);
          (c) fetch all catalog_products WHERE tenant_id = $1 AND sku = ANY($2), where $2 is the
          distinct SKU set from (b). Build maps by orderId and SKU in memory. The product map is
          scoped to this request's tenant and contains only the current response's products.

      F2: Add another index on catalog_products(sku).

      F3: Increase the order-api PostgreSQL pool from 40 to 160 connections.

      F4: Create one process-global DataLoader keyed only by SKU with a 10-minute cache. Reuse it
          for every tenant and every request so repeated SKU lookups avoid PostgreSQL.

      Constraints:
        - The endpoint must sustain 30 normal-size responses per second with response p99 below 300ms.
        - Catalog prices are tenant-specific; a product lookup must never return another tenant's
          price, even when SKUs have the same text value.
        - The endpoint must show current catalog prices; a ten-minute process-global stale cache is
          not allowed for this administrative workflow.
