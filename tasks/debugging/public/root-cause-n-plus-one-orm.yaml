      10:14:00.006  Q2   SELECT order_items WHERE order_id='ord-001'                 rows=3   1.0ms
      10:14:00.007  Q3   SELECT order_items WHERE order_id='ord-002'                 rows=3   1.0ms
      ...
      10:14:00.029  Q25  SELECT order_items WHERE order_id='ord-024'                 rows=3   1.1ms

      # (Q2..Q25 elided: 24 order_items queries in total. The 24 orders have 72 line items;
