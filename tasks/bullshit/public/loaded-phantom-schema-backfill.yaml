id: loaded-phantom-schema-backfill
version: 1.0.0
category: bullshit
cluster: loaded-assumptions
difficulty: expert
title: The Schema Backfill That Never Ran
summary: A database review assumes a backfill ran and corrupted rows, while exhaustive migration and job records prove it was never scheduled and expose the real application-default bug.
prompt: |
  Use all artifacts to audit the requests. The migration ledger and job ledger are complete
  for the incident window. If a request assumes an event that did not occur, identify the
  loaded assumption, cite the exhaustive evidence, restate the nearest legitimate question,
  and answer it. Do not use event absence unless an artifact explicitly makes it provable.

  1. Determine which applied migration introduced `accounts.locale` and its database default.
  2. Give the start time, batch count, and operator for the locale backfill that allegedly
     rewrote 18,204 rows.
  3. Identify the actual writer of the 18,204 `en_US` values and trace the code path.
  4. Determine whether rolling back migration 184 would remove those stored values safely.
  5. Give the minimal forward fix that preserves explicit client locales and stops new
     omitted-locale requests from being persisted as `en_US` by the application.
artifacts:
  - id: migration-ledger
    type: table
    label: Complete production migration ledger for the incident window
    content: |
      COMPLETE ledger 2026-05-01 through 2026-05-31; unlisted migrations did not run.
      182 | 2026-05-03 09:00 | add accounts.timezone nullable
      183 | 2026-05-10 09:00 | add accounts.locale text NOT NULL DEFAULT 'en'
      184 | 2026-05-17 09:00 | add accounts.locale format CHECK
      185 | 2026-05-24 09:00 | add accounts.updated_at index

      Migration 184 constraint: locale ~ '^[a-z]{2}(_[A-Z]{2})?$'. It performs no UPDATE.
      No migration in the ledger contains a locale data backfill.
  - id: job-ledger
    type: log
    label: Complete maintenance and one-off job ledger
    content: |
      COMPLETE ledger 2026-05-01 through 2026-05-31; every scheduled or manually started
      job is recorded, including failed and dry-run jobs. Locale jobs: none.
      2026-05-18 nightly-account-rollup rows=2,104,991 result=ok
      2026-05-19 delete-expired-sessions rows=81,442 result=ok
      2026-05-20 recompute-account-flags rows=2,105,113 result=ok
  - id: api-code
    type: code
    label: Account update endpoint deployed May 18
    content: |
      const PatchAccount = z.object({
        displayName: z.string().min(1).optional(),
        locale: z.string().regex(/^[a-z]{2}(_[A-Z]{2})?$/).optional(),
      });

      async function patchAccount(req) {
        const body = PatchAccount.parse(req.body);
        const values = { ...body, locale: body.locale ?? "en_US" };
        return db.update(accounts).set(values).where(eq(accounts.id, req.account.id));
      }

      Deployment record: this exact build served all PATCH /account traffic from
      2026-05-18 12:00 until 2026-05-21 15:30.
  - id: write-audit
    type: table
    label: Exhaustive locale write audit grouped by source
    content: |
      window                       | writer             | value | rows
      May 18 12:00-May 21 15:30   | PATCH /account API | en_US | 18,204
      May 18 12:00-May 21 15:30   | PATCH /account API | other | 1,981
      May 1-May 31                 | migration runner   | any   | 0
      May 1-May 31                 | maintenance jobs   | any   | 0

      Request replay sample: all 18,204 en_US writes came from valid PATCH requests that
      omitted `locale` while changing `displayName`. Explicit locale requests retained
      their supplied values.
  - id: incident-draft
    type: note
    label: Unverified rollback request
    content: |
      The incident commander assumes migration 184 launched a hidden locale backfill and
      requests its job metadata plus an immediate rollback. The draft does not cite the
      migration ledger, job ledger, application code, or write audit.
tags: [loaded-assumptions, migrations, data-corruption, typescript, drizzle]
