id: reversed-deploy-health
version: 1.1.0
category: bullshit
cluster: reversed-causality
difficulty: expert
title: The Health Probe That Broke the Deploy
summary: A draft retrospective at a checkout API claims the 14:22 health-check storm aborted the canary, the rollback generated the error spike, and the deploy failure saturated the readiness queue. The pipeline spec and minute-level telemetry show every one of those arrows pointing the other way.
prompt: |
  Tidepay's checkout-api canary deploy degraded during incident INC-3309 this afternoon.
  A draft retrospective by the engineer who took the pages (see draft-retro) is circulating
  for review. Using ALL artifacts, answer the six deliverables below.

  Some statements in the draft retro and in the deliverables themselves presuppose
  cause-and-effect relationships. Before answering any deliverable, verify every causal
  premise against the normative trigger directions in deploy-pipeline-spec and the
  recorded timeline (event-stream, traffic-table, deploy-log). If a deliverable
  presupposes a cause-and-effect that the artifacts show running the other way, say so
  explicitly, cite the trigger definitions and timestamps that prove the true direction,
  restate the nearest legitimate question, and answer that from the artifacts. Do not play
  along with a reversed premise, and do not refuse a deliverable that is answerable as
  asked. Cite artifact ids for every claim.

  1. Identify what caused the onset of checkout-api 5xx errors, and give the clock minute at
     which the 5xx rate first exceeded the 2% abort threshold.
  2. Explain the mechanism by which the 14:22 health-check storm aborted canary v3.8.1, and
     quantify how much of the 5xx increase the health probes account for.
  3. Give the exact clock minute at which canary error rate first crossed the deployer's
     abort threshold, and the timestamps of the abort decision and of its completed
     rollback actuation.
  4. Quantify how much of the client 5xx between 14:16 and 14:26 was generated by the
     rollback event, and identify which pods originated it.
  5. The deploy-failure alert flood that began at 14:21 saturated readiness-queue. Compute
     the probe backlog the alert flood added to the queue between 14:21 and 14:25.
  6. Reconstruct the correct end-to-end causal chain of INC-3309 from first cause to the
     pages, in order, giving the timestamp at which each link took effect.
artifacts:
  - id: deploy-pipeline-spec
    type: spec
    label: Tidepay checkout deploy and observation planes (normative trigger directions)
    content: |
      Tidepay checkout deploy and observation planes (region us-west). This spec is the
      complete and authoritative statement of the platform's components and trigger
      directions; no component has any trigger direction other than as stated here.

      Data plane (serving path):
      - edge-gateway: terminates all external client requests. The metric client_req_per_min
        counts ONLY external requests arriving at edge-gateway, attributed per customer
        api_key. Internal components hold no API keys and cannot appear in this count.
      - checkout-api: stateless HTTP service (baseline 10 pods) behind edge-gateway. Canary
        deploys shift 10% of traffic to a canary pod set. Pods serve inbound requests and
        originate none: a checkout-api pod never issues client requests, warm-up traffic,
        or self-calls through edge-gateway.
      - readiness-queue: bounded in-memory queue of readiness probe results, max_depth
        4,000. Its ONLY producer is the kubelet readiness probe path and its ONLY consumer
        is the deploy-controller. At max_depth every further probe result is DROPPED (not
        enqueued). No other component may publish to it.
      - health-probe: kubelet readiness probes run every 5s per pod. Probes are
        observation-only: a failed probe marks a pod NotReady but never generates client
        5xx, never aborts a deploy by itself, and never publishes alerts.

      Actuation plane:
      - deployer (checkout-api canary only): ABORTS BECAUSE OF sustained canary error rate,
        never the reverse. Rule DEP-1: if canary_5xx_pct >= 2.0% for 3 consecutive
        completed minutes, abort the canary and roll back to the previous stable revision
        (120s cooldown). The evaluator runs 10 seconds after each minute closes and reads
        edge metrics READ-ONLY. A rollback replaces canary pods with the prior revision; it
        cannot generate client 5xx, requests, or load of any kind beyond the brief pod
        restart window (which produces zero client-visible 5xx because edge drains
        connections first).

      Observation plane (read-only by construction):
      - metrics-agent -> telemetry-store: source of every metric in this incident's tables.
      - alert-evaluator: ticks 5 seconds after each minute closes and evaluates rules in
        sequence. ALERTS FIRE BECAUSE OF threshold breaches, never the reverse. Rules:
          A1 checkout-api-5xx-rate: fleet 5xx >= 2.0% for 2 consecutive completed minutes.
          A2 canary-abort: fires when deployer records an abort decision.
          A3 readiness-queue-depth: end-of-minute depth >= 3,500 for 2 consecutive minutes.
        Alerts auto-resolve after 2 consecutive minutes back within threshold.
      - pager-dispatch: PAGES ARE SENT BECAUSE ALERTS FIRE, never the reverse. It applies a
        60-second dedup window per alert, then delivers via SignalWave, an external SMS and
        voice provider entirely outside Tidepay infrastructure. Pages never traverse
        edge-gateway, checkout-api, or readiness-queue, and they carry no queue messages.
      - The observation plane holds no write credentials to any data-plane component. Alert
        evaluation and page delivery cannot alter any data-plane metric, queue, or service.
        Health probes cannot abort deploys; only DEP-1 can.
