  - id: draft-retro
    type: note
    label: Draft retrospective for INC-3309 (unreviewed narrative)
    content: |
      Draft retrospective, INC-3309, by p.reyes (UNREVIEWED DRAFT), filed 15:40.

      Summary: At 14:22 a health-check / paging storm hit the on-call rotation - three
      CRIT pages in under 15 seconds. Immediately after the pages went out, checkout-api's
      error rate spiked to roughly 13% and the canary was dead. The health-check storm
      appears to have aborted canary v3.8.1: the abort tracks the pages almost minute for
      minute. At 14:19 the deployer executed a rollback (v3.8.1 -> v3.8.0), and fleet 5xx
      surged toward 13% right after - the rollback generated an error burst the platform
      could not absorb. The deploy-failure alert flood that began at 14:21 then saturated
      readiness-queue, creating a 4,000-probe backlog at the queue's cap.

      Timeline as I understand it: 14:19 deployer rollback -> error surge; 14:21 alert
      flood -> readiness-queue saturation; 14:22 health-check/paging storm -> canary abort;
      14:24 we rate-limited brightcart and everything recovered by 14:28.

      Follow-ups proposed: (1) rate-limit health probes so a probe storm cannot abort
      canaries again; (2) cap the deployer so rollback events stop generating 5xx bursts;
      (3) throttle alert volume during incidents so alert floods cannot refill
      readiness-queue.
tags: [reversed-causality, incident, deploy, canary, health-probes, timeline]
