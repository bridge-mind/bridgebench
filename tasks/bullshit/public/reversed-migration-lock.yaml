  - id: trace-samples
    type: log
    label: Sampled traces during INC-7742 (shared NTP clock, skew < 10ms)
    content: |
      Distributed traces sampled during INC-7742. NTP-disciplined clock (skew < 10ms).
      T-9001  start 03:09:40.100  (pre-onset baseline)
        orders-api POST /v1/checkout -> 200 (total 62 ms)
          orders-db  SELECT/UPDATE on orders -> OK (18 ms)   [no lock contention]
      T-9210  start 03:10:30.400
        orders-api POST /v1/checkout -> 200 (total 4,930 ms)
          orders-db  UPDATE orders ... -> waiting on AccessExclusiveLock (held by ALTER),
                     acquired after 4,880 ms, then OK
        note: query BLOCKED on the migration's lock; connection held checked out the whole time.
      T-9455  start 03:12:03.400  (first client-visible 500 of the incident)
        orders-api POST /v1/checkout -> 500 to client (pool checkout timeout at 10,000 ms)
          orders-db  (no connection acquired; pool exhausted, all 40 blocked on the lock)
        note: first pool-timeout 500 at 03:12:03.400; the 500 did no database work.
      No sampled trace shows orders-api holding a lock on orders-db, a 500 writing to the
      primary, or any edge from a 500 into the replication stream. The trace system records
      every production call edge; the above is the complete pattern observed.
  - id: incident-chat
    type: log
    label: INC-7742 incident channel transcript
    content: |
      #inc-7742 channel (times UTC):
      03:12:20 pagerbot: CRIT orders-api 5xx 8.7% (minute 03:12; threshold 2%)
      03:12:55 p.saito (SRE): every failing trace is a pool checkout timeout. connections are
               all blocked on orders-db. pg_locks shows an ALTER TABLE holding ACCESS EXCLUSIVE
               on orders since 03:10:00 - that's the widen-total migration rewriting 41M rows
      03:13:30 b.cole: is the API hammering the DB? pool's at 40/40
      03:16:10 b.cole: replica lag is 47s - are the 500s backing up replication?
      03:20:30 pagerbot: orders-api 5xx 24% and falling - the ALTER released its lock at 03:20:12
      03:21:40 p.saito: recovered. we'll redo the widen online (nullable column + backfill, no
               rewrite lock). b.cole owns the postmortem
  - id: draft-postmortem
    type: note
    label: Draft postmortem for INC-7742 (unreviewed narrative)
    content: |
      Draft postmortem, INC-7742, by b.cole (UNREVIEWED DRAFT), filed 06:15.

      Summary: At 03:11 orders-api's connection pool exhausted and the flood of blocked
      connections hammered orders-db, slowing its queries to a crawl. The slow queries then
      forced the widen-total migration to grab an ACCESS EXCLUSIVE lock to get any work done,
      and the resulting storm of orders-api 500s backed up into the read replica, driving
      replication lag to 47 seconds. Recovery came once the API error volume subsided and the
      pressure it was putting on the database and the replica lifted.

      Proposed root cause: orders-api connection-pool exhaustion at 03:11.

      Follow-ups proposed: (1) raise the connection-pool size so it cannot exhaust and slow the
      database; (2) rate-limit orders-api 500s so they stop inflating replica lag; (3) add
      load-shedding so query pressure cannot force migrations to take locks.
tags: [reversed-causality, database, migration-lock, connection-pool, replication, postmortem]
