  - id: draft-retro
    type: note
    label: Draft retrospective (UNREVIEWED — contains reversed causal claims)
    content: |
      DRAFT retro INC-5520 — author j.park — DO NOT PUBLISH

      Summary (UNVERIFIED):
      - The 14:22 purge/paging storm mutated origin catalog rows and drove the 5xx
        increase (see deliverable 2 framing).
      - The cache-miss spike after P-8801 generated the origin write traffic that crossed
        the invalidation threshold (see deliverable 4 framing).
      - The invalidation flood that began at 14:21 saturated origin-write-queue and added
        the backlog between 14:21 and 14:25 (see deliverable 5 framing).
