               SKU price rewrite campaign, estimated 45 minutes
      14:13:00 origin_write_per_min becomes nonzero; search-indexer drain baseline 8,000/min
      14:16:00 origin_write_per_min first crosses 9,000 (see traffic-table)
      14:18:05 invalidator INV-1 decision: purge batch P-8801 scheduled (2 consecutive
               qualifying minutes 14:16, 14:17)
      14:19:40 purge batch P-8801 actuation complete on all 14 edge POPs (cache keys
               deleted for written SKUs only; origin rows untouched)
      14:19:50 edge miss_ratio rises as purged keys re-fetch via origin GET
      14:20:18 origin-write-queue depth hits max_depth=12,000; further writer enqueues
               REJECTED; catalog-api begins returning 503 to writers
