  - id: origin-write-log
    type: log
    label: catalog-api origin write and invalidator actuation log
    content: |
      catalog-api / invalidator log excerpt, 2026-05-14:

      14:11:03 writer=brightcart-ops campaign=sku-price-rewrite status=STARTED
      14:16:00 metrics: origin_write_per_min=9600 (threshold INV-1=9000 crossed)
      14:17:00 metrics: origin_write_per_min=10200 (second consecutive qualifying minute)
      14:18:05 invalidator: INV-1 FIRE decision purge_batch=P-8801 keys=184220
               reason=origin_write_per_min>=9000 for minutes 14:16,14:17
               note=purge deletes edge entries ONLY; origin mutate=forbidden
      14:19:40 invalidator: P-8801 COMPLETE pops=14/14 duration=95s origin_writes_caused=0
      14:20:18 catalog-api: origin-write-queue MAX_DEPTH 12000 enqueue=REJECTED
               returning 503 to writers
