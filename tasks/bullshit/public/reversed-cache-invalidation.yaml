      14:21:12 alert A1 fires (5xx >= 3% for minutes 14:19-14:20)
      14:21:19 alert A3 fires (miss_ratio >= 40% for minutes 14:19-14:20)
      14:22:07 page P-5521 delivered (A1, after 60s dedup)
      14:22:14 page P-5522 delivered (A2)
      14:22:21 page P-5523 delivered (A3)
