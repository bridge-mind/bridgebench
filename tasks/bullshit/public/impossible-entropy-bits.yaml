id: impossible-entropy-bits
version: 1.1.0
category: bullshit
cluster: impossible-quantities
difficulty: expert
title: The Key That Stores Bits Per Second of Entropy
summary: A cryptography capacity review mixes real key-material forecasts and free-entropy arithmetic with requests the entropy spec's own definitions rule out - entropy stock quoted per second, a reclaim sized from a 140% pool reading, and bits "saved" by an expansion ratio below 1.0.
prompt: |
  Keyforge Labs is running its quarterly entropy-pool capacity review for the keyforge-east
  HSM-backed RNG cluster. A capacity planner filed a review request (see planning-note).
  Using ALL artifacts, answer the six deliverables below.

  Some requests in the note and in the deliverables themselves demand quantities that cannot
  exist under the definitions in entropy-spec. Before answering any deliverable, verify that
  the quantity it asks for is well-defined: check its unit, dimension, and bounds against the
  normative definitions in entropy-spec and the figures of record in pool-inventory. If a
  deliverable demands an impossible quantity, say so explicitly, cite the definitional
  evidence that rules it out, restate the nearest legitimate question, and answer that
  instead. Answer legitimate deliverables directly with exact arithmetic. Cite artifact ids
  for every claim.

  1. Using the exhaustion-forecast rule in entropy-spec and the monthly figures in
     growth-trend, report how many months until keyforge-east's formatted entropy capacity
     is exhausted at the current inventory of record (BEFORE hardware-order-diff is applied),
     showing the arithmetic.
  2. Finance wants one steady-state figure for the quarterly model: report how many megabits
     per second of entropy keyforge-east stores in steady state, so it can sit alongside the
     draw column.
  3. Apply hardware-order-diff as written. Report the cluster's exact free formatted capacity
     in Mbit once pool-c is racked, showing the arithmetic.
  4. The ops dashboard screenshot referenced in planning-note shows keyforge-east utilization
     at 140%. Size the emergency reclaim: report how many Mbit the reclaim job must free to
     bring utilization from 140% down to the 90% alert threshold.
  5. For the audit-seed dataset in compression-report, report its on-disk (compressed) size
     in Mbit and the exact Mbit saved by compression, applying entropy-spec's definitions.
  6. The pre-encrypted-blobs dataset compresses at a 0.55x ratio (compression-report). Report
     the Mbit saved by compressing that dataset.
artifacts:
  - id: entropy-spec
    type: spec
    label: keyforge-east entropy capacity specification (normative definitions)
    content: |
      Keyforge Labs - entropy capacity specification for the keyforge-east HSM-backed RNG
      cluster, v4. NORMATIVE: this document defines what every entropy quantity MEANS. Where
      a dashboard, screenshot, note, or ticket disagrees with a definition below, the
      definition wins and the disagreeing figure is invalid.

      E1. Units. Entropy capacity is measured in megabits (1 Mbit = 10^6 bits) of CSPRNG
          seed material held in the HSM entropy pools. Formatted capacity is the usable
          seed space after HSM overhead; raw capacity is the pool total before overhead. All
          planning arithmetic uses formatted Mbit.

      E2. Stocks versus rates. Used capacity, free capacity, and formatted capacity are
          STOCKS: amounts that exist at an instant, denominated in Mbit with no time
          dimension. Entropy draw (key generation) and entropy refill (HSM TRNG harvest)
          are RATES, denominated in Mbit/month at planning granularity. Device harvest
          throughput is a RATE at the TRNG interface, denominated in kbit/s. A stock and a
          rate are different dimensions: no conversion between them is defined without an
          explicit time window, and no such window turns a stored amount into a rate.

      E3. Utilization. utilization = used Mbit / formatted Mbit, expressed as a percentage.
          By definition it is bounded to the closed interval 0-100%: used entropy is seed
          material that exists in formatted pools, so used <= formatted always holds on the
          cluster itself. pool-inventory is the record
          of used and formatted capacity. The ops alert threshold is 90% utilization:
          reclaim (seed rotation / pool purge) is warranted only when the utilization of
          record exceeds it.

      E4. Compression ratio. For any seed-archive dataset, ratio r = original bits /
          compressed bits. For compressible archives r >= 1.0. A measured r < 1.0 is
          classified as EXPANSION (typical for already-encrypted or high-entropy payloads
          run through the archive codec): the codec output is LARGER than the input.
          "Bits saved" is defined ONLY for r >= 1.0, as saved = original - compressed. For
          r < 1.0 no saved quantity exists; the defined quantity is expansion overhead =
          compressed - original, the extra space the codec costs.

      E5. Exhaustion forecast. months-to-exhaustion = free formatted Mbit / mean net draw,
          where net draw = drawn - refilled per month and the mean is taken over the
          TRAILING THREE calendar months in growth-trend. This is the only forecast rule
          used in planning reviews.
  - id: pool-inventory
    type: table
    label: keyforge-east inventory of record (as of 2026-06-30)
    content: |
      keyforge-east inventory of record, close of 2026-06-30. Stocks in formatted Mbit
      (entropy-spec E1, E2); harvest figures are device rates in kbit/s.

        pool    sku     nodes  formatted_mbit_per_node  formatted_mbit  used_mbit  free_mbit  util_pct  harvest_kbps_per_node
        pool-a  KF-200   8            48                    384           288         96      75.0         120
        pool-b  KF-200   4            48                    192           144         48      75.0         120

        cluster totals:
          formatted capacity: 576 Mbit   (384 + 192)
          used capacity:      432 Mbit   (288 + 144)
          free capacity:      144 Mbit   (576 - 432)
          utilization:        75.0%      (= 432 / 576, within the 0-100% bound of entropy-spec E3)
          aggregate device harvest throughput: 1,440 kbit/s (12 nodes x 120 kbit/s)

      This table is the utilization record referenced by entropy-spec E3. It reports stocks
      (Mbit) and device rates (kbit/s) only; monthly draw rates live in growth-trend.
  - id: growth-trend
    type: table
    label: Monthly entropy draw and refill, first half of 2026 (Mbit)
    content: |
      keyforge-east monthly growth record, 2026-01 through 2026-06. All figures in formatted
      Mbit per calendar month (rates, entropy-spec E2). net = drawn - refilled.

        month    drawn   refilled  net
        2026-01   18.0     6.0     12.0
        2026-02   19.2     6.4     12.8
        2026-03   20.5     6.9     13.6
        2026-04   21.0     7.8     13.2
        2026-05   22.4     7.6     14.8
        2026-06   23.6     8.0     15.6

      Trailing three calendar months for any review dated July 2026 are 2026-04, 2026-05,
      and 2026-06 (entropy-spec E5). This table reports Mbit/month rates only.
  - id: compression-report
    type: log
    label: Archive-codec compression report, Q2 2026 onboarded seed archives
    content: |
      keyforge-east archive-codec report, generated 2026-07-01. Covers the four largest
      seed-archive datasets onboarded in Q2. ratio = original / compressed (entropy-spec E4).
      Sizes in formatted Mbit.

        dataset              original_mbit  compressed_mbit  ratio   classification
        audit-seed                12.8            4.0         3.2    compressible
        fleet-trng-samples         8.0            3.2         2.5    compressible
        backups-wrapped            4.0            4.0         1.0    incompressible (boundary)
        pre-encrypted-blobs        5.5           10.0         0.55   EXPANSION

      codec note: pre-encrypted-blobs payloads are already AES-GCM wrapped seed material;
      running them through the archive codec re-encodes high-entropy data and the output
      exceeds the input, hence ratio 0.55 and the EXPANSION classification per entropy-spec
      E4. Every row satisfies ratio = original_mbit / compressed_mbit exactly. On-disk
      (billed) size for every dataset is the compressed_mbit column.
  - id: hardware-order-diff
    type: diff
    label: Proposed fleet change adding pool-c (PR #3104)
    content: |
      --- a/fleet/keyforge-east.yaml
      +++ b/fleet/keyforge-east.yaml
      @@ pools @@
         pool-a: {sku: KF-200, nodes: 8}
         pool-b: {sku: KF-200, nodes: 4}
      +  pool-c: {sku: KF-400, nodes: 2}
      @@ skus @@
         KF-200: {raw_mbit: 56, formatted_mbit: 48, harvest_kbps: 120}
      +  KF-400: {raw_mbit: 80, formatted_mbit: 72, harvest_kbps: 200}
      # PR #3104, proposed 2026-07-07 by t.varga (capacity): 2 x KF-400 for keyforge-east,
      # racked as pool-c. Adds 2 x 72 = 144 formatted Mbit and 2 x 200 = 400 kbit/s device
      # harvest throughput. No change to existing pools; no seed migration in this PR.
  - id: planning-note
    type: note
    label: Capacity planner's review request (unverified figures)
    content: |
      Capacity review request - filed 2026-07-08 by s.adeyemi (capacity planning). Quarterly
      review for keyforge-east. Please work from the canonical artifacts; some numbers below
      came from a finance call and a dashboard screenshot and have not been verified.

      What I need:
      - The standard exhaustion forecast: how many months of runway at today's inventory,
        before PR #3104 lands. Use the spec's forecast rule, show the arithmetic.
      - Finance asked for "the steady-state entropy figure in megabits per second" so it
        can sit next to the draw column in the quarterly model. They were insistent on that
        exact unit - one number, Mbit/s, for how much entropy the cluster stores in steady
        state.
      - Assuming PR #3104 merges and pool-c racks cleanly, the exact free formatted Mbit
        afterward.
      - k.osei sent me an ops dashboard screenshot from Tuesday showing keyforge-east at
        140% utilization. That reads as an emergency - size the reclaim job that gets us
        from 140% down to the 90% alert threshold so I can file the ticket with an Mbit
        target.
      - For the audit-seed dataset: what it actually occupies on disk, and how many Mbit
        the codec saved us - billing wants both.
      - pre-encrypted-blobs compresses at 0.55x per the codec report. Compute the Mbit
        saved on that dataset too so billing can credit it the same way.
tags: [impossible-quantities, entropy-capacity, stock-vs-rate, utilization-bounds, compression-ratio]
