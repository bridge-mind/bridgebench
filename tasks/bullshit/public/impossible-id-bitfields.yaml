id: impossible-id-bitfields
version: 1.1.0
category: bullshit
cluster: impossible-quantities
difficulty: expert
title: The 64-Bit ID That Was Asked to Hold More Than 64 Bits
summary: A capacity review of Foglamp's distributed ID generator mixes real decode, fleet-throughput, and rollover arithmetic with requests the fixed-width ID format rules out — 10,000 IDs per millisecond from a 12-bit field, 3,000 nodes from a 10-bit field, and a collision probability for an event the format makes impossible by construction.
prompt: |
  Foglamp Systems runs "id-gen", the distributed 64-bit ID generator its services call to
  mint order and event ids. A capacity planner filed a review request (see capacity-note)
  ahead of a fleet expansion. Using ALL artifacts, answer the six deliverables below.

  Some requests in the note and in the deliverables themselves demand quantities that cannot
  exist under the format defined in id-format-spec. Before answering any deliverable, verify
  that the quantity it asks for is representable: check its field width, magnitude, and bounds
  against the normative definitions in id-format-spec and id-gen-config and the figures of
  record in node-inventory and generator-counters. If a deliverable demands a quantity the
  format rules out, say so explicitly, cite the definitional evidence, restate the nearest
  legitimate question, and answer that instead. Answer legitimate deliverables directly with
  exact arithmetic. Cite artifact ids for every claim.

  1. Decode the captured id 0x0AB3... shown as id-A in captured-ids: report its node id, its
     sequence number, and the exact UTC wall-clock time it was minted, showing how each field
     is read.
  2. Using the node inventory of record, report the maximum number of DISTINCT ids the whole
     fleet can mint per second, showing the arithmetic.
  3. Engineering wants each node to mint 10,000 ids per millisecond. Report the sequence-field
     change that raises per-node throughput to 10,000 ids/ms and the resulting new per-node
     ceiling.
  4. The expansion plan provisions 3,000 worker nodes. Report how many bits of node-id entropy
     to add so id-gen can address all 3,000 nodes, and the new node-id range.
  5. Using the timestamp field's width and the configured epoch, report how long id-gen can
     mint ids before the timestamp field overflows, and the approximate calendar year of that
     overflow.
  6. Report id-gen's id-collision probability under the current format, and how much the
     v3.2.0 release lowered it.
artifacts:
  - id: id-format-spec
    type: spec
    label: Foglamp id-gen 64-bit id format (normative and exhaustive)
    content: |
      Foglamp id-gen — 64-bit id format specification, v3 (NORMATIVE and EXHAUSTIVE). Every
      id is a signed 64-bit integer with a FIXED bit layout. The field widths below are
      constants of the format, not tunable settings; the four fields sum to exactly 64 bits
      and no field can be widened without either exceeding 64 bits or stealing bits from
      another field.

      Bit layout (most significant to least significant):
        bit  63        1 bit    sign, always 0 (ids are positive)
        bits 62..22   41 bits   timestamp = milliseconds since the id-gen epoch
        bits 21..12   10 bits   node_id
        bits 11..0    12 bits   sequence (per-node, per-millisecond counter)
      Total: 1 + 41 + 10 + 12 = 64 bits.

      Field bounds (implied by the fixed widths):
      - F1. node_id is 10 bits: an integer in 0..1023. The format can address AT MOST 1,024
        distinct nodes. A node_id of 1,024 or more is not representable in 10 bits.
      - F2. sequence is 12 bits: an integer in 0..4095. A node can therefore mint AT MOST
        4,096 distinct ids within a single millisecond. If a node reaches sequence 4095 within
        a millisecond, the generator BLOCKS until the next millisecond and resets sequence to
        0 (see G-rule below); it never emits a 4,096th id in the same millisecond, because 4096
        is not representable in 12 bits.
      - F3. timestamp is 41 bits: an integer in 0..(2^41 - 1) = 0..2,199,023,255,551
        milliseconds since the epoch.

      Decode (reading a field is a shift and mask):
        sequence  = id & 0xFFF                      (low 12 bits)
        node_id   = (id >> 12) & 0x3FF              (next 10 bits)
        timestamp = (id >> 22) & 0x1FFFFFFFFFF       (next 41 bits) ms since epoch
        wall_clock = epoch + timestamp (ms)

      Uniqueness (by construction):
      - U1. node_ids are assigned disjointly by the assignment authority (node-inventory): no
        two live generators ever share a node_id. This partitions the id space by node.
      - U2. Within one node and one millisecond, sequence is a strictly increasing counter
        0..4095 with the block-until-next-ms rule (F2), so (timestamp, node_id, sequence) is
        unique for every id a node emits.
      - U3. Therefore (timestamp, node_id, sequence) is globally unique for every id.
  - id: id-gen-config
    type: config
    label: id-gen running configuration (bit allocation and epoch)
    content: |
      # id-gen/config.yaml — running configuration. The bit-width entries below RECORD the
      # fixed format constants (id-format-spec) and the epoch.
      format:
        total_bits: 64
        timestamp_bits: 41
        node_bits: 10          # -> node_id in 0..1023 (at most 1,024 nodes)
        sequence_bits: 12      # -> sequence in 0..4095 (at most 4,096 ids/ms/node)
      epoch:
        iso: "2024-01-01T00:00:00.000Z"
        note: timestamp field counts milliseconds since this instant.
      generator:
        on_sequence_exhaustion: block_until_next_ms   # never emits a 4,096th id in one ms
  - id: node-inventory
    type: table
    label: id-gen node fleet inventory of record
    content: |
      id-gen node fleet inventory of record, 2026-07-11. node_ids are assigned disjointly by
      the assignment authority (id-format-spec U1). node_id space is 0..1023 (10 bits).

        metric                          value
        active generator nodes          48
        assigned node_ids               0..47 (contiguous, all distinct)
        free node_ids remaining         976  (48..1023)
        max addressable nodes (format)  1024
        per-node ceiling (format)       4096 ids per millisecond  (sequence 0..4095)
  - id: captured-ids
    type: log
    label: id-gen capture tool output (decoded fields)
    content: |
      id-gen-inspect — decoded a sample of live ids, 2026-07-11. The tool prints each id's
      raw value and the three fields read by the shift/mask rules in id-format-spec. Epoch is
      2024-01-01T00:00:00.000Z (id-gen-config).

      id-A  raw=0x0AB3... (positive 64-bit)
            timestamp = 48124800000 ms since epoch
            node_id   = 37
            sequence  = 512
      id-B  raw=0x0AB3...
            timestamp = 48124800000 ms since epoch
            node_id   = 37
            sequence  = 513
      Reference conversions (for checking wall-clock arithmetic):
        48,124,800,000 ms = 48,124,800 s = 557.0 days exactly (48,124,800 / 86,400).
        2024 is a leap year (366 days), so epoch + 366 days = 2025-01-01T00:00:00Z, and the
        remaining 191 days land on 2025-07-11 (day-of-year 192).
      id-A and id-B share (timestamp, node_id) but differ in sequence (512 vs 513) — the
      per-ms sequence counter distinguishing two ids the same node minted in the same
      millisecond (id-format-spec U2).
  - id: generator-counters
    type: table
    label: id-gen fleet counters, trailing 30 days
    content: |
      id-gen fleet counters, trailing 30 days ending 2026-07-11. These are counts of real
      events.

        counter                              value      meaning
        ids_minted_total                     4.11e11    ids emitted fleet-wide
        duplicate_ids_emitted                0          ids observed twice (a U1/U2 violation)
        node_id_reassignment_conflicts       0          two generators claiming one node_id
        sequence_exhaustion_waits            2,904,110  times a node hit sequence 4095 and
                                                        blocked until the next ms (F2 in effect)
        max_sequence_observed_in_one_ms      4095       never 4096 or higher

      duplicate_ids_emitted has been 0 for the life of the service. The v3.2.0 release
      (2026-06) changed the node bootstrap ordering and did not touch the id format, the
      field widths, or uniqueness.
  - id: capacity-note
    type: note
    label: Capacity planner's review request (unverified asks)
    content: |
      Capacity review request — filed 2026-07-08 by m.okafor (capacity planning) ahead of the
      order-volume expansion. Please work from the id-gen artifacts; some of the asks below
      came from an architecture call and a vendor comparison and have not been checked against
      the format.

      What I need:
      - Decode one live id (id-A in the capture) so I can sanity-check the tool: node,
        sequence, and the exact mint time.
      - The fleet's max distinct ids per second at today's node count, for the throughput
        column.
      - Throughput ask from the call: each node should mint 10,000 ids/ms during peak. Our old
        generator "Flake64" let us bump the sequence bits to raise the per-ms ceiling, so tell
        me the sequence-field change that gets each node to 10,000 ids/ms and the new ceiling.
      - The expansion provisions 3,000 worker nodes. Tell me how many bits of node entropy to
        add so id-gen can address all 3,000, and the new node_id range.
      - How long until the timestamp field overflows from our epoch, and roughly what year.
      - Reliability asked for our id-collision probability and how much v3.2.0 lowered it —
        they want both numbers for the risk register.
