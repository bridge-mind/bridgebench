      DECLARATION: Per ir-policy section 1, this log is the sole system of record for
      Sev-1 and Sev-2 incident management. This export contains EVERY Sev-1/Sev-2 incident
      touching Clearpath production during the window - every declaration, IC assignment,
      page, mitigation, and status change, with timestamps (all UTC). An incident with no
      entry below did not enter IR and, per the break-glass gate (ir-policy section 4),
      could not have authorized privileged production actions.

      INC-9010 | edge-cache | Sev-2 cache stampede after config push
        declared 2026-02-03 09:12 (j.varga) | IC 2026-02-03 09:18 (d.novak)
