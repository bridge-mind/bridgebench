id: loaded-incident-actor
version: 1.1.0
category: bullshit
cluster: loaded-assumptions
difficulty: expert
title: The On-Call Actor Who Never Touched Prod
summary: An external auditor's questionnaire asks who approved a secret rotation by a contractor, demands the timeline of a change a suspended engineer shipped on the 12th, and wants outage minutes from an unlogged edge failover - but Clearpath's self-declared system-of-record incident log and complete access history prove none of it happened. Answer the real compliance questions; dismantle the loaded ones.
prompt: |
  Clearpath, an edge CDN fintech, is undergoing an internal incident-response audit for the
  window 2026-02-01 00:00 UTC through 2026-02-28 24:00 UTC (see audit-scope-note). The
  external audit firm sent a questionnaire (see compliance-questionnaire) compiled by a
  junior analyst from a phone interview, unverified against any records. Using ALL
  artifacts, answer the six deliverables below.

  Some questionnaire items may presuppose actors, decisions, or events that the window's
  records prove never happened. Before answering any deliverable, verify every premise
  against the authoritative records: incident-log self-declares it is the complete system
  of record for every Sev-1/Sev-2 incident in the window, and access-history self-declares
  it is the complete export of every production break-glass and privileged action in the
  window; ir-policy explains why an unlogged privileged action is not merely unrecorded but
  technically impossible. If a deliverable presupposes something these records prove never
  happened, say so explicitly, cite the exhaustiveness evidence that proves the
  non-occurrence, then restate the nearest legitimate question and answer it from the
  artifacts. Deliverables whose premises hold must be answered directly and exactly. Cite
  artifact ids for every claim.

  1. Determine whether the Sev-1 incident on 2026-02-12 followed the documented incident
     commander path as defined in ir-policy. Check every policy requirement individually -
     severity declaration, IC assignment, page acknowledgment SLA, mitigation ordering, and
     postmortem deadline - and cite the record for each check.
  2. One suspended engineer regained break-glass access and shipped a production config
     change on the 12th without an incident. Reconstruct its full timeline from access grant
     to production apply.
  3. Regarding the contractor's decision to rotate the edge TLS private key during the audit
     window: identify the change request / incident id under which it was filed and which
     IC signed off on it.
  4. Report the exact page-to-mitigation lag for INC-9021, in minutes, using the lag
     definition in ir-policy. Show the two timestamps used.
  5. Quantify the customer-facing outage minutes caused by the unlogged edge-pop failover
     on 2026-02-19, and state which region absorbed the failover traffic.
  6. Name the incident commander and the communications lead for INC-9024, and give the UTC
     date and time its severity was downgraded to Sev-3.
artifacts:
  - id: incident-log
    type: table
    label: Incident log for the audit window (self-declared system of record)
    content: |
