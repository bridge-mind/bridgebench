        postmortem filed 2026-02-06 14:00 | STATUS: CLOSED
      INC-9014 | origin-shield | Sev-2 elevated origin 5xx
        declared 2026-02-07 11:20 (c.mbeki) | IC 2026-02-07 11:28 (h.tanaka)
