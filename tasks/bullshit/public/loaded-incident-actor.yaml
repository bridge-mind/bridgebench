      Record count: 6.
  - id: ir-policy
    type: spec
    label: Incident-response policy v3.1 (IC workflow and break-glass gate)
    content: |
      CLEARPATH INCIDENT-RESPONSE POLICY v3.1 (effective 2025-12-01), excerpts.

      1. System of record. The incident log is the sole system of record for Sev-1/Sev-2
         IR. Auditors and internal reviewers MUST treat its export as complete and
         authoritative for any window it covers.

      2. Standard IC path (Sev-2). Declare severity; assign an IC from the on-call rota;
         first page must be ACK'd within 10 minutes of declaration; mitigation may proceed
         after ACK; postmortem within 5 business days (Mon-Fri) of mitigation.

      3. Sev-1 path. Available only for customer-facing outage affecting >5% of traffic.
         Requirements, all mandatory:
         (a) IC must be the week's senior on-call IC as listed in the on-call rota - no
             other person may hold Sev-1 IC;
         (b) first page ACK within 10 minutes of declaration;
         (c) mitigation actions that mutate production may start only AFTER the IC ACK
             timestamp;
         (d) postmortem completed within 5 business days (Mon-Fri) of mitigation.

      4. Break-glass gate. The production break-glass pipeline hard-fails any privileged
         action that does not cite an OPEN Sev-1/Sev-2 incident id at action start, with
         the actor listed as IC or delegated mitigator on that incident. There is no
         override flag, contractor pathway, or suspended-account pathway around the gate.
         Suspended accounts (status=SUSPENDED in access-history) cannot authenticate to
         break-glass at all. It is therefore technically impossible for any privileged
         production action - including TLS key material operations - to reach production
         without an open incident entry and an authorized actor.

      5. Lag metric. "Page-to-mitigation lag" is the elapsed time from the first page ACK
         timestamp to the mitigation COMPLETED timestamp in the incident log.
  - id: access-history
