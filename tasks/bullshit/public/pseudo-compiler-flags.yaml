                   object map (includes late object arrival from distributed cc)
      12:06:31.560 link: steady artifact, text section 38.6/44.0 MB used
      12:41:07.201 link: periodic self-check, artifact unchanged on disk
  - id: compiler-flags-diff
    type: diff
    label: Proposed CFLAGS change for payments-core (from the tuning proposal)
    content: |
      --- a/deploy/payments-core/CFLAGS
      +++ b/deploy/payments-core/CFLAGS
      @@ flags @@
      --O2 -finline-threshold=200
      +-O3 -finline-threshold=400 -flto
       # Proposed by p.varga 2026-07-10 to implement recommendations R1 and R3 of
       # tuning-proposal-note. Staging ran all four combinations of inline_threshold and
       # -flto at -O2/-O3; see staging-benchmark-table.
  - id: staging-benchmark-table
    type: table
    label: Staging benchmark, payments-core replay harness, all four candidate configs
    content: |
      Staging benchmark, payments-core replay harness, 2026-07-10. Three runs per config,
      30-minute steady-state measurement window after cold-start. cold_start_ms is measured
      from process start to first successful /ready. binary_mb and compile_s match
      forgec-reference O3/O4.

      config             opt  inline_T  flto  compile_s  binary_mb  cold_start_ms  throughput_rps  p99_ms
      A (current prod)   O2   200       off   120.0      44.0       410            22180           18.1
      B (inline raise)   O2   400       off   150.0      46.0       408            22460           17.6
      C (LTO only)       O2   200       on    240.0      43.8       412            22210           18.0
      D (proposed diff)  O3   400       on    270.0      45.9       409            22480           17.5

      Run-to-run throughput noise is +/-0.5% (about +/-110 rps); differences within that
      band are not significant. Cold-start noise is +/-5 ms. Text-section used bytes
      matched binary size minus rodata/data in every run.
  - id: tuning-proposal-note
    type: note
    label: Tuning proposal for payments-core by p.varga (unreviewed claims)
    content: |
      Tuning proposal, payments-core, filed by p.varga (perf guild), 2026-07-10. Implemented
      as the flag change in compiler-flags-diff.

      R1. Raise inline_threshold 200 -> 400. More inlining removes call boundaries on the
      hot settlement path. Binary size and compile time will rise per the reference
      formulas; throughput should improve modestly.

      R2. Enable -flto. With LTO the linker defragments the instruction cache between
      compilation units, hot code gets laid out contiguously, and cold-start should drop
      from ~410 ms toward ~200 ms.

      R3. Raise -O 2 -> 3. Fewer stack frames held alive means the linker can reuse those
      freed frames as text-section free space. Back of the envelope, roughly 1.5 GB
      reclaimed.

      Bonus: deeper inlining should also lower instruction entropy, which improves
      branch-predictor hit rates, so we may bank a measurable IPC gain on top.
tags: [plausible-pseudoscience, compiler-flags, lto, inlining, performance]
