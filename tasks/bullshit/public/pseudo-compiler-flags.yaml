      09:09:40.110 build: wall compile+link 120.0 s (matches C(s)=90+0.15*200=120)
      SUMMARY: production binary 44.0 MB at inline_threshold=200, -O2, no LTO. This log
      reports compile/link data only; request throughput and cold-start live in
      staging-benchmark-table.
  - id: link-log
    type: log
    label: ForgeC link log, payments-core production rebuild, 2026-07-09
    content: |
      forgec-link.log, service payments-core, host prod-pay-03, rebuild 2026-07-09 12:04 UTC.
      Config: -O2, inline_threshold=200, -flto=off.
      12:04:11.154 link: first object mapped settlement/ledger.o
